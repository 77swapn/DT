<!doctype html>
<html lang="hi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>हनुमान चालीसा</title>
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --gold: #d4af37;
      --saffron: #ff671f;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    @supports (scrollbar-width: none) {
      * {
        scrollbar-width: none;
      }
    }

    *::-webkit-scrollbar {
      display: none;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: "Yatra One", system-ui;
      overflow: hidden;
    }

    /* ── Layout ── */
    .main-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .image-side {
      height: 100%;
      flex: 0 0 auto;
      position: relative;
      background: #050505;
      min-width: 280px;
    }

    .image-side img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }

    .image-fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 0 30px;
      text-align: center;
    }

    .fallback-symbol {
      font-family: "Yatra One";
      font-size: 5rem;
      color: var(--gold);
      opacity: 0.4;
      line-height: 1;
    }

    .fallback-text {
      font-family: "Yatra One";
      font-size: 1.6rem;
      color: var(--saffron);
      opacity: 0.7;
    }

    .fallback-hint {
      font-family: "Kalam";
      font-size: 0.75rem;
      color: #444;
      margin-top: 12px;
    }

    .image-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 80%, var(--bg));
    }

    @media (max-width: 600px) {
      .image-side {
        display: none;
      }
    }

    .reader-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
      min-width: 0;
    }

    /* ── Canvases ── */
    #particle-canvas,
    #finish-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #particle-canvas {
      z-index: 1;
    }

    #finish-canvas {
      z-index: 150;
    }

    /* ── Header ── */
    .header {
      padding: 4vh 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: linear-gradient(to bottom, var(--bg) 60%, transparent);
      flex-shrink: 0;
    }

    .stat-group {
      display: flex;
      gap: 32px;
    }

    .label {
      font-size: 11px;
      color: #666;
      display: block;
      font-family: "Kalam";
      font-weight: 700;
    }

    .val {
      font-size: 1.5rem;
      color: var(--gold);
      font-family: "Yatra One";
    }

    #stable-marker {
      color: var(--gold);
      font-size: 1.3rem;
      letter-spacing: 2px;
    }

    /* ── Viewport & text ── */
    .viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    #text-container {
      position: absolute;
      width: 100%;
      padding: 0 5vw;
      text-align: center;
      transition: transform 0.9s cubic-bezier(0.19, 1, 0.22, 1);
      will-change: transform;
    }

    .line-item {
      margin-bottom: 9vh;
      transition:
        opacity 0.7s ease,
        filter 0.7s ease,
        transform 0.7s ease;
      opacity: 0.06;
      filter: blur(6px);
      transform: scale(0.82);
    }

    .line-item.active {
      opacity: 1;
      filter: blur(0);
      transform: scale(1.08);
    }

    .line-wrapper {
      position: relative;
      display: inline-block;
      line-height: 1.6;
    }

    .line-ghost {
      font-size: clamp(1.1rem, 2.5vw, 1.75rem);
      font-family: "Yatra One";
      color: rgba(255, 255, 255, 0.08);
      display: block;
    }

    .line-reveal {
      font-size: clamp(1.1rem, 2.5vw, 1.75rem);
      font-family: "Yatra One";
      position: absolute;
      inset: 0;
      -webkit-clip-path: inset(0 100% 0 0);
      clip-path: inset(0 100% 0 0);
      white-space: nowrap;
    }

    .line-item.active.focus-saffron .line-reveal {
      color: var(--saffron);
      text-shadow: 0 0 18px rgba(255, 103, 31, 0.35);
      animation: clipReveal 2s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .line-item.active.focus-white .line-reveal {
      color: #fff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.35);
      animation: clipReveal 2s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes clipReveal {
      from {
        -webkit-clip-path: inset(0 100% 0 0);
        clip-path: inset(0 100% 0 0);
      }

      to {
        -webkit-clip-path: inset(0 0% 0 0);
        clip-path: inset(0 0% 0 0);
      }
    }

    /* ── Overlays ── */
    #completion-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.97);
      z-index: 200;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1.4s ease-in;
    }

    #completion-overlay.visible {
      opacity: 1;
    }

    .done-title {
      color: var(--gold);
      font-size: clamp(2rem, 6vw, 4.5rem);
      text-align: center;
    }

    .done-sub {
      color: #fff;
      font-size: 1.4rem;
      font-family: "Kalam";
      margin: 16px 0;
      text-align: center;
    }

    .mgmt-link {
      color: #444;
      cursor: pointer;
      text-decoration: underline;
      font-family: "Kalam";
      transition: color 0.2s;
    }

    .mgmt-link:hover {
      color: #888;
    }

    #reset-panel {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      z-index: 300;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    #reset-panel.open {
      display: flex;
    }

    .rp-title {
      color: var(--gold);
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .rp-btn {
      background: none;
      border: 1px solid #333;
      color: #ccc;
      font-family: "Kalam";
      font-size: 1rem;
      padding: 10px 28px;
      border-radius: 6px;
      cursor: pointer;
      width: 260px;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .rp-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .rp-input {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      font-family: "Kalam";
      font-size: 1rem;
      padding: 8px 14px;
      border-radius: 6px;
      width: 260px;
      display: none;
    }

    .rp-close {
      color: #444;
      cursor: pointer;
      font-family: "Kalam";
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .rp-close:hover {
      color: #888;
    }

    /* ── Footer ── */
    .footer {
      padding: 2.5vh 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "Kalam";
      font-size: 12px;
      color: #222;
      border-top: 1px solid #111;
      background: var(--bg);
      z-index: 100;
      flex-shrink: 0;
    }

    .reset-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      text-decoration: underline;
      font-family: inherit;
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .footer span {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="main-container">
    <div class="image-side">
      <img src="C:\Users\Asus\Pictures\hanuman.jpeg" alt="Hanuman Ji"
        onerror="this.style.display='none'; document.getElementById('image-fallback').style.display='flex';" />
      <div id="image-fallback" class="image-fallback">
        <div class="fallback-symbol">॥</div>
        <div class="fallback-text">श्री हनुमान</div>
        <div class="fallback-hint">hanuman.jpeg को इसी folder में रखें</div>
      </div>
    </div>

    <div class="reader-side">
      <canvas id="particle-canvas"></canvas>
      <canvas id="finish-canvas"></canvas>

      <div id="completion-overlay">
        <div class="done-title">॥ जय श्री राम ॥</div>
        <div class="done-sub">सियावर रामचंद्र की जय ! पवनसुत हनुमान की जय !!</div>
        <div class="mgmt-link" onclick="openResetPanel()">
          आज के पाठ पूर्ण हुए, अनलॉक / प्रबंधन
        </div>
      </div>

      <div id="reset-panel">
        <div class="rp-title">॥ प्रगति प्रबंधन ॥</div>
        <button class="rp-btn" onclick="doReset('full')">
          पूर्ण रीसेट करें
        </button>
        <button class="rp-btn" onclick="showDayInput()">दिवस बदलें</button>
        <input class="rp-input" id="day-input" type="number" min="1" placeholder="दिवस संख्या दर्ज करें"
          onkeydown="if (event.key === 'Enter') doReset('day');" />
        <button class="rp-btn" onclick="doReset('unlock')">
          आज का अनलॉक करें
        </button>
        <div class="rp-close" onclick="closeResetPanel()">✕ बंद करें</div>
      </div>

      <div class="header">
        <div class="stat-group">
          <div>
            <span class="label">दिवस</span><span id="day-ui" class="val">१</span>
          </div>
          <div>
            <span class="label">पाठ</span><span id="cycle-ui" class="val">१ / ७</span>
          </div>
        </div>
        <div id="stable-marker">॥ दोहा ॥</div>
      </div>

      <div class="viewport" id="viewport">
        <div id="text-container"></div>
      </div>

      <div class="footer">
        <button class="reset-btn" onclick="openResetPanel()">
          More →
        </button>
        <span>← Swapnil Patil</span>
      </div>
    </div>
  </div>

  <script>
    const LINES = [
      { s: "॥ दोहा ॥", t: "॥ जय श्री राम ॥" },
      { s: "॥ दोहा ॥", t: "श्रीगुरु चरन सरोज रज निज मनु मुकुरु सुधारि ।" },
      { s: "॥ दोहा ॥", t: "बरनउँ रघुबर बिमल जसु जो दायकु फल चारि ॥" },
      { s: "॥ दोहा ॥", t: "बुद्धिहीन तनु जानिके सुमिरौं पवन-कुमार ।" },
      { s: "॥ दोहा ॥", t: "बल बुधि बिद्या देहु मोहिं हरहु कलेस बिकार ॥" },
      { s: "॥ चौपाई ॥", t: "जय हनुमान ज्ञान गुन सागर । जय कपीस तिहुँ लोक उजागर ॥ १ ॥" },
      { s: "॥ चौपाई ॥", t: "राम दूत अतुलित बल धामा । अंजनि-पुत्र पवनसुत नामा ॥ २ ॥" },
      { s: "॥ चौपाई ॥", t: "महाबीर बिक्रम बजरंगी । कुमति निवार सुमति के संगी ॥ ३ ॥" },
      { s: "॥ चौपाई ॥", t: "कंचन बरन बिराज सुबेसा । कानन कुंडल कुंचित केसा ॥ ४ ॥" },
      { s: "॥ चौपाई ॥", t: "हाथ बज्र औ ध्वजा बिराजै । काँधे मूँज जनेऊ साजै ॥ ५ ॥" },
      { s: "॥ चौपाई ॥", t: "संकर सुवन केसरीनंदन । तेज प्रताप महा जग बंदन ॥ ६ ॥" },
      { s: "॥ चौपाई ॥", t: "बिद्यावान गुनी अति चातुर । राम काज करिबे को आतुर ॥ ७ ॥" },
      { s: "॥ चौपाई ॥", t: "प्रभु चरित्र सुनिबे को रसिया । राम लखन सीता मन बसिया ॥ ८ ॥" },
      { s: "॥ चौपाई ॥", t: "सूक्ष्म रूप धरि सियहिं दिखावा । बिकट रूप धरि लंक जरावा ॥ ९ ॥" },
      { s: "॥ चौपाई ॥", t: "भीम रूप धरि असुर सँहारे । रामचंद्र के काज सँवारे ॥ १० ॥" },
      { s: "॥ चौपाई ॥", t: "लाय सजीवन लखन जियाये । श्रीरघुवीर हरषि उर लाये ॥ ११ ॥" },
      { s: "॥ चौपाई ॥", t: "रघुपति कीन्ही बहुत बड़ाई । तुम मम प्रिय भरतहि सम भाई ॥ १२ ॥" },
      { s: "॥ चौपाई ॥", t: "सहस बदन तुम्हरो जस गावैं । अस कहि श्रीपति कंठ लगावैं ॥ १३ ॥" },
      { s: "॥ चौपाई ॥", t: "सनकादिक ब्रह्मादि मुनीसा । नारद सारद सहित अहीसा ॥ १४ ॥" },
      { s: "॥ चौपाई ॥", t: "जम कुबेर दिगपाल जहाँ ते । कबि कोबिद कहि सके कहाँ ते ॥ १५ ॥" },
      { s: "॥ चौपाई ॥", t: "तुम उपकार सुग्रीवहिं कीन्हा । राम मिलाय राज पद दीन्हा ॥ १६ ॥" },
      { s: "॥ चौपाई ॥", t: "तुम्हरो मंत्र बिभीषन माना । लंकेस्वर भए सब जग जाना ॥ १७ ॥" },
      { s: "॥ चौपाई ॥", t: "जुग सहस्र जोजन पर भानू । लील्यो ताहि मधुर फल जानू ॥ १८ ॥" },
      { s: "॥ चौपाई ॥", t: "प्रभु मुद्रिका मेलि मुख माहीं । जलधि लाँघि गये अचरज नाहीं ॥ १९ ॥" },
      { s: "॥ चौपाई ॥", t: "दुर्गम काज जगत के जेते । सुगम अनुग्रह तुम्हरे तेते ॥ २० ॥" },
      { s: "॥ चौपाई ॥", t: "राम दुआरे तुम रखवारे । होत न आज्ञा बिनु पैसारे ॥ २१ ॥" },
      { s: "॥ चौपाई ॥", t: "सब सुख लहै तुम्हारी सरना । तुम रक्षक काहू को डर ना ॥ २२ ॥" },
      { s: "॥ चौपाई ॥", t: "आपन तेज सम्हारो आपै । तीनों लोक हाँक तें काँपै ॥ २३ ॥" },
      { s: "॥ चौपाई ॥", t: "भूत पिसाच निकट नहिं आवै । महाबीर जब नाम सुनावै ॥ २४ ॥" },
      { s: "॥ चौपाई ॥", t: "नासै रोग हरै सब पीरा । जपत निरंतर हनुमत बीरा ॥ २५ ॥" },
      { s: "॥ चौपाई ॥", t: "संकट तें हनुमान छुड़ावै । मन क्रम बचन ध्यान जो लावै ॥ २६ ॥" },
      { s: "॥ चौपाई ॥", t: "सब पर राम तपस्वी राजा । तिन के काज सकल तुम साजा ॥ २७ ॥" },
      { s: "॥ चौपाई ॥", t: "और मनोरथ जो कोई लावै । सोइ अमित जीवन फल पावै ॥ २८ ॥" },
      { s: "॥ चौपाई ॥", t: "चारों जुग परताप तुम्हारा । है परसिद्ध जगत उजियारा ॥ २९ ॥" },
      { s: "॥ चौपाई ॥", t: "साधु संत के तुम रखवारे । असुर निकंदन राम दुलारे ॥ ३० ॥" },
      { s: "॥ चौपाई ॥", t: "अष्ट सिद्धि नौ निधि के दाता । अस बर दीन जानकी माता ॥ ३१ ॥" },
      { s: "॥ चौपाई ॥", t: "राम रसायन तुम्हरे पासा । सदा रहो रघुपति के दासा ॥ ३२ ॥" },
      { s: "॥ चौपाई ॥", t: "तुम्हरे भजन राम को पावै । जनम जनम के दुख बिसरावै ॥ ३३ ॥" },
      { s: "॥ चौपाई ॥", t: "अंत काल रघुबर पुर जाई । जहाँ जन्म हरि-भक्त कहाई ॥ ३४ ॥" },
      { s: "॥ चौपाई ॥", t: "और देवता चित्त न धरई । हनुमत सेइ सर्ब सुख करई ॥ ३५ ॥" },
      { s: "॥ चौपाई ॥", t: "संकट कटै मिटै सब पीरा । जो सुमिरै हनुमत बलबीरा ॥ ३६ ॥" },
      { s: "॥ चौपाई ॥", t: "जय जय जय हनुमान गोसाईं । कृपा करहु गुरुदेव की नाईं ॥ ३७ ॥" },
      { s: "॥ चौपाई ॥", t: "जो सत बार पाठ कर कोई । छूटहि बंदि महा सुख होई ॥ ३८ ॥" },
      { s: "॥ चौपाई ॥", t: "जो यह पढ़ै हनुमान चालीसा । होय सिद्धि साखी गौरीसा ॥ ३९ ॥" },
      { s: "॥ चौपाई ॥", t: "तुलसीदास सदा हरि चेरा । कीजै नाथ हृदय मँह डेरा ॥ ४० ॥" },
      { s: "॥ दोहा ॥", t: "पवनतनय संकट हरन मंगल मूरति रूप ।" },
      { s: "॥ दोहा ॥", t: "राम लखन सीता सहित हृदय बसहु सुर भूप ॥" },
      { s: "॥ दोहा ॥", t: "॥ श्रीरामदूतं शरणं प्रपद्ये ॥" }
    ];

    const TOTAL_CYCLES = 7;
    const STORAGE = {
      day: "hday_v2",
      cycle: "hcyc_v2",
      date: "hdate_v2",
      awaitingFinal: "hawait_v2"
    };

    let day = parseInt(localStorage.getItem(STORAGE.day), 10) || 1;
    let cycle = parseInt(localStorage.getItem(STORAGE.cycle), 10) || 0;
    let lastDate = localStorage.getItem(STORAGE.date) || "";
    let lineIdx = 0;
    let awaitingFinalConfirm = localStorage.getItem(STORAGE.awaitingFinal) === "1";

    const container = document.getElementById("text-container");
    const viewport = document.getElementById("viewport");
    const fCanvas = document.getElementById("finish-canvas");
    const fCtx = fCanvas.getContext("2d");
    const bgCanvas = document.getElementById("particle-canvas");
    const bgCtx = bgCanvas.getContext("2d");
    const marker = document.getElementById("stable-marker");
    const overlay = document.getElementById("completion-overlay");

    function hi(num) {
      const d = ["०", "१", "२", "३", "४", "५", "६", "७", "८", "९"];
      return String(num).replace(/[0-9]/g, (ch) => d[+ch]);
    }

    function buildLines() {
      container.innerHTML = LINES.map(
        (ln, i) =>
          `<div class="line-item" id="item-${i}">
       <div class="line-wrapper">
         <span class="line-ghost">${ln.t}</span>
         <span class="line-reveal">${ln.t}</span>
       </div>
     </div>`,
      ).join("");
    }

    function centreActive() {
      const vH = viewport.offsetHeight;
      const el = document.getElementById(`item-${lineIdx}`);
      if (!el) return;
      const offset = vH / 2 - el.offsetTop - el.offsetHeight / 2;
      container.style.transform = `translateY(${offset}px)`;
    }

    function update() {
      document.getElementById("day-ui").innerText = hi(day);
      const displayCycle = Math.min(cycle + 1, TOTAL_CYCLES);
      document.getElementById("cycle-ui").innerText = hi(displayCycle) + " / " + hi(TOTAL_CYCLES);
      marker.innerText = LINES[lineIdx].s;

      document.querySelectorAll(".line-item").forEach((el) =>
        el.classList.remove("active", "focus-saffron", "focus-white")
      );

      const active = document.getElementById(`item-${lineIdx}`);
      active.classList.add("active");
      active.classList.add(LINES[lineIdx].s === "॥ दोहा ॥" ? "focus-white" : "focus-saffron");

      centreActive();
      save();
    }

    function save() {
      localStorage.setItem(STORAGE.day, day);
      localStorage.setItem(STORAGE.cycle, cycle);
      if (awaitingFinalConfirm) {
        localStorage.setItem(STORAGE.awaitingFinal, "1");
      } else {
        localStorage.removeItem(STORAGE.awaitingFinal);
      }
    }

    function hideOverlay() {
      overlay.classList.remove("visible");
      overlay.style.display = "none";
    }

    function resetToStart() {
      lineIdx = 0;
      cycle = 0;
      awaitingFinalConfirm = false;
      hideOverlay();
      update();
    }

    function move(dir) {
      if (overlay.style.display === "flex") return;
      if (dir === 1) {
        if (awaitingFinalConfirm) {
          localStorage.setItem(STORAGE.date, new Date().toDateString());
          lastDate = new Date().toDateString();
          awaitingFinalConfirm = false;
          save();
          showCompletionOverlay();
          return;
        }
        if (lineIdx < LINES.length - 1) {
          lineIdx++;
        } else {
          lineIdx = 0;
          cycle++;
          if (cycle >= TOTAL_CYCLES) {
            day++;
            cycle = 0;
            awaitingFinalConfirm = true;
            update();
            triggerSparkle(true);
            return;
          } else {
            triggerSparkle(false);
          }
        }
      } else {
        if (lineIdx > 0) lineIdx--;
      }
      update();
    }

    function showCompletionOverlay() {
      overlay.style.display = "flex";
      requestAnimationFrame(() =>
        requestAnimationFrame(() => overlay.classList.add("visible"))
      );
    }

    function triggerSparkle(grand) {
      const count = grand ? 420 : 80;
      let particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: fCanvas.width / 2,
          y: fCanvas.height / 2,
          vx: (Math.random() - 0.5) * (grand ? 38 : 16),
          vy: (Math.random() - 0.5) * (grand ? 38 : 16),
          life: 1,
          color: grand
            ? `hsl(${45 + Math.random() * 20}, 80%, ${50 + Math.random() * 30}%)`
            : `rgba(255,103,31,${0.6 + Math.random() * 0.4})`,
        });
      }
      (function anim() {
        fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
        particles = particles.filter((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.18;
          p.life -= 0.012;
          fCtx.globalAlpha = Math.max(0, p.life);
          fCtx.fillStyle = p.color;
          fCtx.beginPath();
          fCtx.arc(p.x, p.y, grand ? 3 : 2, 0, Math.PI * 2);
          fCtx.fill();
          return p.life > 0;
        });
        fCtx.globalAlpha = 1;
        if (particles.length > 0) requestAnimationFrame(anim);
      })();
    }

    let bgParticles = [];
    let bgNebulae = [];
    let bgDustLanes = [];
    let shootingStars = [];
    let nextShootingStarTime = 0;

    function initBgParticles() {
      bgParticles = [];
      if (bgCanvas.width === 0 || bgCanvas.height === 0) return;

      // Dense starfield — 1 star per ~1800px of area for that immersive cosmic depth
      const totalCount = Math.floor((bgCanvas.width * bgCanvas.height) / 1800);

      // 70% of stars cluster near the galactic core; 30% scatter across the whole frame
      const clusteredCount = Math.floor(totalCount * 0.7);
      const scatteredCount = totalCount - clusteredCount;

      const coreX = bgCanvas.width * 0.5;
      const coreY = bgCanvas.height * 0.5;
      const clusterRadius = Math.min(bgCanvas.width, bgCanvas.height) * 0.7;

      // Clustered stars — gaussian-ish distribution around the galactic core
      for (let i = 0; i < clusteredCount; i++) {
        // Use sum of two randoms to approximate normal distribution
        const r = ((Math.random() + Math.random() + Math.random()) / 3) * clusterRadius;
        const theta = Math.random() * Math.PI * 2;
        const x = coreX + Math.cos(theta) * r;
        const y = coreY + Math.sin(theta) * r;
        bgParticles.push(makeStar(x, y));
      }

      // Scattered stars — fill in the void areas
      for (let i = 0; i < scatteredCount; i++) {
        bgParticles.push(makeStar(Math.random() * bgCanvas.width, Math.random() * bgCanvas.height));
      }
    }

    function makeStar(x, y) {
      const depthRoll = Math.random();
      let depth, sizeRange, speedRange, opacityRange;
      if (depthRoll < 0.65) {
        depth = "far";
        sizeRange = [0.3, 0.9];
        speedRange = [0.015, 0.05];
        opacityRange = [0.2, 0.55];
      } else if (depthRoll < 0.92) {
        depth = "mid";
        sizeRange = [0.8, 1.5];
        speedRange = [0.05, 0.12];
        opacityRange = [0.4, 0.75];
      } else {
        depth = "near";
        sizeRange = [1.4, 2.2];
        speedRange = [0.12, 0.25];
        opacityRange = [0.7, 1.0];
      }

      // Color: mostly white, some warm gold, some cool blue, a few bright cyan
      const colorRoll = Math.random();
      let color;
      if (colorRoll < 0.7) color = [255, 255, 255];
      else if (colorRoll < 0.85) color = [255, 235, 200]; // warm
      else if (colorRoll < 0.96) color = [200, 220, 255]; // cool blue
      else color = [180, 230, 255];                        // bright cyan

      // 8% of near stars become "diamonds" with cross-shaped light rays
      const isDiamond = depth === "near" && Math.random() < 0.4;

      return {
        x: x, y: y,
        size: sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
        speed: speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]),
        baseOpacity: opacityRange[0] + Math.random() * (opacityRange[1] - opacityRange[0]),
        color: color,
        depth: depth,
        isDiamond: isDiamond,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.005 + Math.random() * 0.02,
        twinkles: Math.random() < 0.65,
      };
    }

    function initBgNebulae() {
      bgNebulae = [];
      if (bgCanvas.width === 0 || bgCanvas.height === 0) return;

      // Aurora-galaxy palette: deep cosmic greens for the gas, soft violet accents for depth.
      // No luminous cores — keep it subtle and even, no bright blurry spots.
      const greenShades = [
        [20, 70, 55],     // very deep forest-cosmic green
        [35, 110, 80],    // aurora green
        [50, 140, 105],   // brighter teal-green
        [25, 90, 70],     // muted emerald
      ];
      const violetShades = [
        [70, 50, 110],    // deep cosmic violet
        [95, 70, 140],    // soft plum
      ];

      // 5 green gas clouds — the dominant cosmic atmosphere
      for (let i = 0; i < 5; i++) {
        const color = greenShades[Math.floor(Math.random() * greenShades.length)];
        bgNebulae.push({
          x: Math.random() * bgCanvas.width,
          y: Math.random() * bgCanvas.height,
          radius: Math.min(bgCanvas.width, bgCanvas.height) * (0.35 + Math.random() * 0.25),
          color: color,
          type: "gas",
          opacity: 0.07 + Math.random() * 0.06,
          vx: (Math.random() - 0.5) * 0.025,
          vy: (Math.random() - 0.5) * 0.025,
          pulsePhase: Math.random() * Math.PI * 2,
          pulseSpeed: 0.0006 + Math.random() * 0.001,
        });
      }

      // 2 violet accents — minority color for depth and contrast
      for (let i = 0; i < 2; i++) {
        const color = violetShades[Math.floor(Math.random() * violetShades.length)];
        bgNebulae.push({
          x: Math.random() * bgCanvas.width,
          y: Math.random() * bgCanvas.height,
          radius: Math.min(bgCanvas.width, bgCanvas.height) * (0.25 + Math.random() * 0.2),
          color: color,
          type: "gas",
          opacity: 0.05 + Math.random() * 0.05,
          vx: (Math.random() - 0.5) * 0.025,
          vy: (Math.random() - 0.5) * 0.025,
          pulsePhase: Math.random() * Math.PI * 2,
          pulseSpeed: 0.0006 + Math.random() * 0.001,
        });
      }
    }

    function initDustLanes() {
      bgDustLanes = [];
      if (bgCanvas.width === 0 || bgCanvas.height === 0) return;

      // 2-3 dark dust lanes — wispy bands that occlude light, suggesting galactic structure
      const laneCount = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < laneCount; i++) {
        // Each lane is an elongated dark ellipse, rotated at an angle
        bgDustLanes.push({
          x: Math.random() * bgCanvas.width,
          y: Math.random() * bgCanvas.height,
          length: Math.min(bgCanvas.width, bgCanvas.height) * (0.6 + Math.random() * 0.4),
          width: Math.min(bgCanvas.width, bgCanvas.height) * (0.06 + Math.random() * 0.08),
          angle: Math.random() * Math.PI,
          opacity: 0.12 + Math.random() * 0.08,
          vx: (Math.random() - 0.5) * 0.015,
          vy: (Math.random() - 0.5) * 0.015,
        });
      }
    }

    function drawNebula(n) {
      const [r, g, b] = n.color;
      n.pulsePhase += n.pulseSpeed;
      const pulsedOpacity = n.opacity * (0.8 + 0.2 * Math.sin(n.pulsePhase));

      const gradient = bgCtx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
      gradient.addColorStop(0, `rgba(${r},${g},${b},${pulsedOpacity})`);
      gradient.addColorStop(0.5, `rgba(${r},${g},${b},${pulsedOpacity * 0.4})`);
      gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);

      bgCtx.fillStyle = gradient;
      bgCtx.beginPath();
      bgCtx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      bgCtx.fill();
    }

    function drawDustLane(d) {
      // Dark elongated ellipse using a radial gradient (faded edges) and rotation
      bgCtx.save();
      bgCtx.translate(d.x, d.y);
      bgCtx.rotate(d.angle);
      // Use a linear gradient along the length for varying density
      const gradient = bgCtx.createLinearGradient(-d.length / 2, 0, d.length / 2, 0);
      gradient.addColorStop(0, "rgba(0, 0, 10, 0)");
      gradient.addColorStop(0.3, `rgba(0, 0, 10, ${d.opacity * 0.7})`);
      gradient.addColorStop(0.5, `rgba(0, 0, 10, ${d.opacity})`);
      gradient.addColorStop(0.7, `rgba(0, 0, 10, ${d.opacity * 0.7})`);
      gradient.addColorStop(1, "rgba(0, 0, 10, 0)");
      bgCtx.fillStyle = gradient;
      bgCtx.beginPath();
      bgCtx.ellipse(0, 0, d.length / 2, d.width / 2, 0, 0, Math.PI * 2);
      bgCtx.fill();
      bgCtx.restore();

      d.x += d.vx;
      d.y += d.vy;
    }

    function drawDiamondStar(p, opacity) {
      const [r, g, b] = p.color;
      // Draw cross-shaped light rays for the "diamond" sparkle effect
      const rayLength = p.size * 8;
      const grad = bgCtx.createLinearGradient(p.x - rayLength, p.y, p.x + rayLength, p.y);
      grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
      grad.addColorStop(0.5, `rgba(${r},${g},${b},${opacity * 0.6})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(p.x - rayLength, p.y - 0.4, rayLength * 2, 0.8);

      const gradV = bgCtx.createLinearGradient(p.x, p.y - rayLength, p.x, p.y + rayLength);
      gradV.addColorStop(0, `rgba(${r},${g},${b},0)`);
      gradV.addColorStop(0.5, `rgba(${r},${g},${b},${opacity * 0.6})`);
      gradV.addColorStop(1, `rgba(${r},${g},${b},0)`);
      bgCtx.fillStyle = gradV;
      bgCtx.fillRect(p.x - 0.4, p.y - rayLength, 0.8, rayLength * 2);
    }

    function animBg() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

      // Layer 1: Gas nebulae (green + violet)
      bgNebulae.forEach((n) => {
        drawNebula(n);
        n.x += n.vx; n.y += n.vy;
        if (n.x < -n.radius) n.x = bgCanvas.width + n.radius;
        if (n.x > bgCanvas.width + n.radius) n.x = -n.radius;
        if (n.y < -n.radius) n.y = bgCanvas.height + n.radius;
        if (n.y > bgCanvas.height + n.radius) n.y = -n.radius;
      });

      // Layer 2: Dust lanes — dark occlusion bands suggesting galactic structure
      bgDustLanes.forEach((d) => {
        drawDustLane(d);
        if (d.x < -d.length) d.x = bgCanvas.width + d.length;
        if (d.x > bgCanvas.width + d.length) d.x = -d.length;
        if (d.y < -d.length) d.y = bgCanvas.height + d.length;
        if (d.y > bgCanvas.height + d.length) d.y = -d.length;
      });

      // Layer 3: Stars
      bgParticles.forEach((p) => {
        let opacity = p.baseOpacity;
        if (p.twinkles) {
          p.twinklePhase += p.twinkleSpeed;
          opacity = p.baseOpacity * (0.6 + 0.4 * Math.sin(p.twinklePhase));
        }

        const [r, g, b] = p.color;

        // Glow halo on brighter stars
        if (p.depth === "near" || (p.depth === "mid" && p.size > 1.2)) {
          const haloRadius = p.size * 3;
          const gradient = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, haloRadius);
          gradient.addColorStop(0, `rgba(${r},${g},${b},${opacity * 0.5})`);
          gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
          bgCtx.fillStyle = gradient;
          bgCtx.beginPath();
          bgCtx.arc(p.x, p.y, haloRadius, 0, Math.PI * 2);
          bgCtx.fill();
        }

        // Diamond cross rays for special near stars
        if (p.isDiamond) {
          drawDiamondStar(p, opacity);
        }

        // Star body
        bgCtx.fillStyle = `rgba(${r},${g},${b},${opacity})`;
        bgCtx.beginPath();
        bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        bgCtx.fill();

        p.y -= p.speed;
        if (p.y < -5) {
          p.y = bgCanvas.height + 5;
          p.x = Math.random() * bgCanvas.width;
        }
      });

      // Layer 4: Shooting stars on top of everything
      const now = performance.now();
      if (now > nextShootingStarTime && bgCanvas.width > 0) {
        spawnShootingStar();
        nextShootingStarTime = now + 4000 + Math.random() * 6000;
      }

      shootingStars = shootingStars.filter((s) => {
        drawShootingStar(s);
        s.x += s.vx;
        s.y += s.vy;
        s.life -= s.decay;
        return s.life > 0 &&
          s.x > -s.trailLength && s.x < bgCanvas.width + s.trailLength &&
          s.y > -s.trailLength && s.y < bgCanvas.height + s.trailLength;
      });
    }

    function spawnShootingStar() {
      // Enter from top or left edges, exit toward bottom-right or bottom-left
      // This biases trajectories to feel like meteors falling diagonally
      const fromLeft = Math.random() < 0.5;
      let x, y, angle;

      if (fromLeft) {
        // Enter from top-left quadrant, travel down-right
        x = -20 + Math.random() * (bgCanvas.width * 0.4);
        y = -20 + Math.random() * (bgCanvas.height * 0.3);
        angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2; // ~27° to ~63° from horizontal
      } else {
        // Enter from top-right quadrant, travel down-left
        x = bgCanvas.width * 0.6 + Math.random() * (bgCanvas.width * 0.4 + 20);
        y = -20 + Math.random() * (bgCanvas.height * 0.3);
        angle = Math.PI * 0.65 + Math.random() * Math.PI * 0.2; // mirror of above
      }

      // Most are small and white; occasionally a bigger colored one
      const isBig = Math.random() < 0.2;
      const colorRoll = Math.random();
      let color;
      if (isBig && colorRoll < 0.5) {
        color = [255, 220, 150]; // warm gold
      } else if (isBig && colorRoll < 0.8) {
        color = [180, 220, 255]; // cool blue
      } else {
        color = [255, 255, 255]; // white
      }

      const speed = isBig ? 5 + Math.random() * 2 : 4 + Math.random() * 1.5;

      shootingStars.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        // Decay rate determines how long the streak lives. Big ones last a touch longer.
        decay: isBig ? 0.005 : 0.008,
        size: isBig ? 2.0 : 1.2,
        trailLength: isBig ? 80 : 50,
        color: color,
      });
    }

    function drawShootingStar(s) {
      const [r, g, b] = s.color;
      // Tail end position — opposite the velocity direction
      const tailX = s.x - (s.vx / Math.hypot(s.vx, s.vy)) * s.trailLength;
      const tailY = s.y - (s.vy / Math.hypot(s.vx, s.vy)) * s.trailLength;

      // Streak: gradient from bright head to transparent tail
      const gradient = bgCtx.createLinearGradient(s.x, s.y, tailX, tailY);
      gradient.addColorStop(0, `rgba(${r},${g},${b},${s.life})`);
      gradient.addColorStop(0.4, `rgba(${r},${g},${b},${s.life * 0.4})`);
      gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);

      bgCtx.strokeStyle = gradient;
      bgCtx.lineWidth = s.size;
      bgCtx.lineCap = "round";
      bgCtx.beginPath();
      bgCtx.moveTo(s.x, s.y);
      bgCtx.lineTo(tailX, tailY);
      bgCtx.stroke();

      // Bright head — small glow blob at the leading edge
      const headGlow = bgCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 4);
      headGlow.addColorStop(0, `rgba(${r},${g},${b},${s.life * 0.9})`);
      headGlow.addColorStop(1, `rgba(${r},${g},${b},0)`);
      bgCtx.fillStyle = headGlow;
      bgCtx.beginPath();
      bgCtx.arc(s.x, s.y, s.size * 4, 0, Math.PI * 2);
      bgCtx.fill();
    }

    function bgLoop() {
      animBg();
      requestAnimationFrame(bgLoop);
    }

    function onResize() {
      fCanvas.width = fCanvas.offsetWidth;
      fCanvas.height = fCanvas.offsetHeight;
      bgCanvas.width = bgCanvas.offsetWidth;
      bgCanvas.height = bgCanvas.offsetHeight;
      initBgParticles();
      initBgNebulae();
      initDustLanes();
      centreActive();
    }

    let touchStartX = 0;
    document.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) move(dx < 0 ? 1 : -1);
    }, { passive: true });

    window.addEventListener("keydown", (e) => {
      if (["ArrowRight", "ArrowDown", " "].includes(e.key)) { e.preventDefault(); move(1); }
      if (["ArrowLeft", "ArrowUp"].includes(e.key)) { e.preventDefault(); move(-1); }
    });

    function openResetPanel() { document.getElementById("reset-panel").classList.add("open"); }
    function closeResetPanel() { document.getElementById("reset-panel").classList.remove("open"); }
    function showDayInput() {
      const inp = document.getElementById("day-input");
      inp.style.display = "block";
      inp.focus();
    }
    function doReset(type) {
      if (type === "full") {
        Object.values(STORAGE).forEach((k) => localStorage.removeItem(k));
        day = 1;
        cycle = 0;
        lastDate = "";
        awaitingFinalConfirm = false;
        closeResetPanel();
        resetToStart();
      } else if (type === "day") {
        const val = parseInt(document.getElementById("day-input").value, 10);
        if (val > 0) {
          day = val;
          cycle = 0;
          awaitingFinalConfirm = false;
          localStorage.setItem(STORAGE.day, day);
          localStorage.removeItem(STORAGE.awaitingFinal);
          document.getElementById("day-input").value = "";
          document.getElementById("day-input").style.display = "none";
          closeResetPanel();
          resetToStart();
        }
      } else if (type === "unlock") {
        localStorage.removeItem(STORAGE.date);
        lastDate = "";
        closeResetPanel();
        hideOverlay();
      }
    }

    function init() {
      buildLines();
      window.addEventListener("resize", onResize);
      onResize();
      bgLoop();
      // Delay first shooting star so the scene settles before one appears
      nextShootingStarTime = performance.now() + 3000 + Math.random() * 3000;
      update();
      if (lastDate === new Date().toDateString() && !awaitingFinalConfirm) {
        showCompletionOverlay();
      }
    }
    init();
  </script>
</body>

</html>
