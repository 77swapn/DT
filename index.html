<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownTown</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22black%22>$</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
            gap: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #333;
            background-color: #1a1a1a;
            color: #ffffff;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        input[type="text"]:focus {
            border-color: #add8e6;
        }

        .button {
            --main-size: 1.5em;
            --color-text: #ffffff;
            --color-background: #ff135a;
            --color-background-hover: #ff1472;
            --color-outline: #ff145a40;
            --color-shadow: #00000040;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            border: none;
            border-radius: calc(var(--main-size) * 100);
            padding: 0.33em 0.8em 0.33em 1.2em;
            font-family: "Poppins", sans-serif;
            font-weight: 600;
            font-size: var(--main-size);
            color: var(--color-text);
            background: var(--color-background);
            width: 100%;
            box-sizing: border-box;

            outline: 0.1em solid transparent;
            outline-offset: 0.2em;
            box-shadow: 0 0 1em 0 var(--color-background);
            animation:
                ripple 1s linear infinite,
                colorize 1s infinite;
            transition: 0.5s;
        }

        .button:active {
            transform: scale(0.95);
        }

        .button:hover {
            outline: none;
            box-shadow: 0 0 0.3em 0 var(--color-background);
            animation: none;
            background: var(--color-background-hover);
            transition: 0.3s;
        }

        .button span {
            margin-right: 0.3em;
            transition: 0.5s;
            text-shadow: 5px 5px 5px var(--color-shadow);
        }

        .button:hover span {
            text-shadow: none;
        }

        .button:active span {
            text-shadow: none;
        }

        .button svg {
            height: 0.8em;
            fill: var(--color-text);
            margin-right: 0.66em;
            position: relative;
            transition: 0.5s;
            filter: drop-shadow(5px 5px 2.5px var(--color-shadow));
        }

        .button:hover svg {
            margin-right: -0.16em;
            filter: none;
        }

        .button:active svg {
            filter: none;
        }

        .button svg polygon:nth-child(1) {
            transition: 0.4s;
            transform: translateX(0%);
            animation: opacity 1s infinite 0.6s;
        }

        .button svg polygon:nth-child(2) {
            transition: 0.5s;
            transform: translateX(0%);
            animation: opacity 1s infinite 0.4s;
        }

        .button svg polygon:nth-child(3) {
            animation: opacity 1s infinite 0.2s;
        }

        .button:hover svg polygon:nth-child(1) {
            transform: translateX(-60%);
            animation: none;
            opacity: 1;
        }

        .button:hover svg polygon:nth-child(2) {
            transform: translateX(-30%);
            animation: none;
            opacity: 1;
        }

        .button:hover svg polygon:nth-child(3) {
            animation: none;
            opacity: 1;
        }

        @keyframes opacity {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes colorize {
            0% { background: var(--color-background); }
            50% { background: var(--color-background-hover); }
            100% { background: var(--color-background); }
        }

        @keyframes ripple {
            0% { outline: 0em solid transparent; outline-offset: -0.1em; }
            50% { outline: 0.2em solid var(--color-outline); outline-offset: 0.2em; }
            100% { outline: 0.4em solid transparent; outline-offset: 0.4em; }
        }

        .loading {
            display: none;
            margin-bottom: 20px;
        }

        .loading svg polyline {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .loading svg polyline#back {
            fill: none;
            stroke: #ff4d5033;
        }

        .loading svg polyline#front {
            fill: none;
            stroke: #ff4d4f;
            stroke-dasharray: 48, 144;
            stroke-dashoffset: 192;
            animation: dash_682 1.4s linear infinite;
        }

        @keyframes dash_682 {
            72.5% { opacity: 0; }
            to { stroke-dashoffset: 0; }
        }

        .notice {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="loading" id="loader">
            <svg width="64px" height="48px">
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="back"></polyline>
                <polyline points="0.157 23.954, 14 23.954, 21.843 48, 43 0, 50 24, 64 24" id="front"></polyline>
            </svg>
        </div>
        <input type="text" id="linkInput" placeholder="paste here..">
        <button id="downloadBtn" class="button">
            <span>DOWNLOAD</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 43">
                <polygon points="39.58,4.46 44.11,0 66,21.5 44.11,43 39.58,38.54 56.94,21.5"></polygon>
                <polygon points="19.79,4.46 24.32,0 46.21,21.5 24.32,43 19.79,38.54 37.15,21.5"></polygon>
                <polygon points="0,4.46 4.53,0 26.42,21.5 4.53,43 0,38.54 17.36,21.5"></polygon>
            </svg>
        </button>
        <div class="notice" id="statusText">Developed by 77swapn</div>
    </div>

    <script>
        const linkInput = document.getElementById('linkInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');

        // Main processing function
        async function processDownload(url) {
            downloadBtn.style.display = 'none';
            loader.style.display = 'block';
            statusText.style.color = '#add8e6';
            statusText.innerText = 'Extracting video, please wait...';

            // 🛑 REPLACE THIS WITH YOUR DEPLOYED BACKEND API URL
            const myApiDomain = 'https://YOUR-DEPLOYED-API-URL.onrender.com'; 

            try {
                // Pointing to the /igdl endpoint of the milancodess API
                const apiUrl = `${myApiDomain}/igdl?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API HTTP Error: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                console.log("Full API Response:", data);

                // Flexible search to find video/image links in the custom backend's response
                function extractLinks(obj, urls = []) {
                    if (!obj) return urls;
                    if (Array.isArray(obj)) {
                        for (let item of obj) {
                            extractLinks(item, urls);
                        }
                    } else if (typeof obj === 'object') {
                        // Check common keys for media URLs
                        let keysToExtract = ['url', 'video', 'download_link', 'media'];
                        for (let key of keysToExtract) {
                            if (typeof obj[key] === 'string' && obj[key].startsWith('http')) {
                                const val = obj[key];
                                if (!urls.includes(val) && !val.includes('profile')) {
                                    urls.push(val);
                                }
                            }
                        }
                        for (let key in obj) {
                            if (key.toLowerCase().includes('thumb')) continue;
                            extractLinks(obj[key], urls);
                        }
                    }
                    return urls;
                }

                const finalDownloadLinks = extractLinks(data);

                if (finalDownloadLinks && finalDownloadLinks.length > 0) {
                    statusText.innerText = `Found ${finalDownloadLinks.length} items. Starting download...`;
                    for (let i = 0; i < finalDownloadLinks.length; i++) {
                        const isVideo = finalDownloadLinks[i].includes('.mp4') || finalDownloadLinks[i].includes('video');
                        const fileExt = isVideo ? 'mp4' : 'jpg';
                        await forceDownload(finalDownloadLinks[i], `instagram_media_${i + 1}.${fileExt}`, i + 1, finalDownloadLinks.length);
                    }
                    statusText.innerText = `All ${finalDownloadLinks.length} downloads finished!`;
                    setTimeout(resetUI, 5000);
                } else {
                    alert('Could not extract media links. Check browser console for API response structure.');
                    resetUI();
                }

            } catch (err) {
                alert('Network error. Ensure your backend server is running and check the console.');
                console.error("Download Error:", err);
                resetUI();
            }
        }

        async function forceDownload(url, filename, currentIndex, totalCount) {
            try {
                if (currentIndex && totalCount) {
                    statusText.innerText = `Downloading ${currentIndex} of ${totalCount}...`;
                } else {
                    statusText.innerText = 'Downloading file to device...';
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename || 'instagram_video.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                
                if (currentIndex && totalCount) {
                    statusText.innerText = `Downloaded ${currentIndex} of ${totalCount}!`;
                } else {
                    statusText.innerText = 'Download started!';
                }
                await new Promise(resolve => setTimeout(resolve, 500));
            } catch (e) {
                console.warn('Direct blob download failed (CORS restriction). Opening in a new tab...', e);
                statusText.innerText = `Redirecting item ${currentIndex || 1} (Tap options/long-press to save)`;
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.download = filename || 'instagram_video.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }

        function resetUI() {
            loader.style.display = 'none';
            downloadBtn.style.display = 'flex';
            statusText.style.color = '#666';
            statusText.innerText = 'Developed by 77swapn';
            linkInput.value = '';
        }

        linkInput.addEventListener('click', async () => {
            linkInput.value = '';
            try {
                const text = await navigator.clipboard.readText();
                if (text && (text.includes('instagram.com') || text.includes('instagr.am'))) {
                    linkInput.value = text;
                    processDownload(text);
                }
            } catch (err) {
                console.log('Clipboard permission denied or unavailable.', err);
            }
        });

        downloadBtn.addEventListener('click', () => {
            const url = linkInput.value.trim();
            if (!url) {
                alert('Please provide an Instagram link first.');
                return;
            }
            processDownload(url);
        });
    </script>
</body>

</html>
