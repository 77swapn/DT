<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Justice Court — Official Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════
   FOUNDATION — Reset, tokens, base
   ════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Surfaces */
  --white:#ffffff;
  --off:#f7f8fb;
  --surface:#eef1f6;
  --border:#dde2ec;
  --bm:#c5cbd8;

  /* Brand */
  --accent:#1a4a8a;
  --adark:#0f2f5e;
  --alite:#2c5fa8;
  --accent-soft:#e8eff8;
  --accent-soft2:#dde7f5;

  /* Status */
  --gold:#b8902a;
  --glt:#d4aa46;
  --red:#b42020;
  --red-soft:#fce8e8;
  --green:#2e6b32;
  --green-soft:#e8f5e9;

  /* Text */
  --text:#1a1e2a;
  --tm:#3d4455;
  --mu:#6b7385;
  --lt:#9ba3b5;

  /* Shadows */
  --s1:0 1px 4px rgba(26,74,138,.07);
  --s2:0 4px 16px rgba(26,74,138,.10);
  --s3:0 8px 32px rgba(26,74,138,.14);

  /* Sizing */
  --r:6px;
  --r-sm:4px;
  --r-lg:8px;
  --r-full:999px;
  --nh:56px;

  /* Typography */
  --fs:'Source Sans 3',sans-serif;
  --ff:'Source Serif 4',serif;
  --fs-dev:'Noto Sans Devanagari',sans-serif;
  --ff-dev:'Noto Serif Devanagari',serif;

  /* Layout */
  --max-w:1140px;
  --pad:2rem;
  --gap:1.5rem;
}

body.lang-mr{
  --fs:'Noto Sans Devanagari',sans-serif;
  --ff:'Noto Serif Devanagari',serif;
}

html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--off);
  color:var(--text);
  font-family:var(--fs);
  font-weight:400;
  line-height:1.7;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body.lang-mr{line-height:1.85}

button{font-family:inherit}
input,select,textarea{font-family:inherit;color:inherit}

/* ════════════════════════════════════════════════════════
   TOP BANNER
   ════════════════════════════════════════════════════════ */
.top-banner{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  height:38px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--pad);
}
.tb-left{display:flex;align-items:center;gap:.55rem;font-size:.72rem;color:var(--mu)}
.tb-left strong{color:var(--adark);font-weight:600}
.tb-right{font-size:.65rem;letter-spacing:.08em;color:var(--lt);text-transform:uppercase;font-weight:500}

/* ════════════════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════════════════ */
header{
  background:var(--white);
  border-bottom:3px solid var(--accent);
  box-shadow:var(--s1);
}
.header-inner{
  max-width:var(--max-w);
  margin:0 auto;
  padding:1.15rem var(--pad);
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:var(--gap);
}
.brand{display:flex;align-items:center;gap:1.15rem}
.seal{
  width:60px;height:60px;flex-shrink:0;
  background:var(--white);
  border:2.5px solid var(--accent);
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  box-shadow:0 0 0 4px var(--accent-soft);
}
.seal .s-ico{font-size:1.6rem;line-height:1}
.seal .s-yr{font-size:.45rem;color:var(--accent);letter-spacing:.1em;margin-top:2px;font-weight:600}
.brand-text .court-name{
  font-family:var(--ff);
  font-size:1.3rem;font-weight:700;
  color:var(--adark);
  line-height:1.25;
}
.brand-text .court-sub{
  font-size:.75rem;
  color:var(--mu);
  margin-top:3px;
  letter-spacing:.01em;
}
.header-right{text-align:right;flex-shrink:0}
.hd-date{font-size:.75rem;color:var(--mu)}
.hd-badge{
  display:inline-block;
  background:var(--accent);color:#fff;
  font-size:.6rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.22rem .7rem;border-radius:2px;
  margin-top:.4rem;
}

.gold-rule{
  height:3px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--gold) 50%,var(--accent) 100%);
}

/* ════════════════════════════════════════════════════════
   NAV — symmetric layout
   ════════════════════════════════════════════════════════ */
nav{
  background:var(--white);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 8px rgba(26,74,138,.04);
  position:sticky;top:0;z-index:50;
}
.nav-inner{
  max-width:var(--max-w);
  margin:0 auto;
  padding:0 var(--pad);
  height:var(--nh);
  display:flex;
  align-items:center;
  gap:0;
}
.nav-btn{
  height:var(--nh);
  padding:0 1.3rem;
  background:none;border:none;
  border-bottom:3px solid transparent;
  font-size:.85rem;font-weight:500;
  color:var(--tm);
  cursor:pointer;
  display:flex;align-items:center;gap:.5rem;
  transition:color .18s,border-color .18s,background .18s;
  white-space:nowrap;
  letter-spacing:.01em;
}
.nav-btn:hover{color:var(--accent);background:var(--off)}
.nav-btn.active{color:var(--adark);border-bottom-color:var(--gold);font-weight:600}
.nav-spacer{flex:1}

/* ROUND BUTTONS — light, symmetric pair */
.round-btn{
  width:40px;height:40px;
  flex-shrink:0;
  border-radius:50%;
  border:1.5px solid var(--bm);
  background:var(--white);
  color:var(--tm);
  font-size:.95rem;font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;justify-content:center;
  line-height:1;
  padding:0;
  text-align:center;
  position:relative;
  outline:none;
  transition:border-color .18s ease,background .18s ease,color .18s ease,transform .15s ease,box-shadow .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.round-btn>*{
  display:flex;
  align-items:center;justify-content:center;
  width:100%;height:100%;
  line-height:1;
}
.round-btn+.round-btn{margin-left:.5rem}
.lang-round{margin-right:.4rem}

/* Hover & active — LIGHT colours only, no dark fill */
.round-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-soft);
  transform:translateY(-1px);
  box-shadow:0 3px 8px rgba(26,74,138,.12);
}
.round-btn:active{
  transform:translateY(0);
  background:var(--accent-soft2);
}
.round-btn:focus-visible{
  box-shadow:0 0 0 3px var(--accent-soft2);
}

/* Tooltip */
.round-btn::after{
  content:attr(data-tip);
  position:absolute;
  top:calc(100% + 10px);left:50%;
  transform:translateX(-50%);
  background:var(--white);
  color:var(--adark);
  border:1px solid var(--border);
  box-shadow:var(--s2);
  font-size:.7rem;font-weight:500;
  letter-spacing:.01em;
  padding:.35rem .7rem;
  border-radius:var(--r-sm);
  white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .18s ease .12s;
  z-index:60;
}
.round-btn:hover::after{opacity:1}

/* Language round button — alt-language letter centered */
.lang-round-label{
  font-family:var(--ff);
  font-size:1.05rem;
  font-weight:700;
  display:inline-flex;
  align-items:center;justify-content:center;
}
/* When current is English, button shows 'म' → use Devanagari serif */
body:not(.lang-mr) .lang-round-label{
  font-family:var(--ff-dev);
  font-size:1.15rem;
}
/* When current is Marathi, button shows 'E' → use Latin serif */
body.lang-mr .lang-round-label{
  font-family:'Source Serif 4',serif;
  font-size:1.05rem;
}

/* Admin round button — user SVG icon centered */
.admin-round svg{
  width:18px;height:18px;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  display:block;
}
.admin-round.logged-in{
  background:var(--accent-soft);
  border-color:var(--accent);
  color:var(--accent);
}
.admin-round.logged-in::before{
  content:'';
  position:absolute;
  top:3px;right:3px;
  width:9px;height:9px;
  border-radius:50%;
  background:var(--green);
  border:2px solid var(--white);
}
.admin-round.active{
  background:var(--accent-soft2);
  border-color:var(--accent);
  color:var(--adark);
  box-shadow:0 0 0 3px var(--accent-soft);
}

/* SEARCH BOX */
.search-box{
  display:flex;align-items:center;
  border:1.5px solid var(--bm);
  border-radius:var(--r);
  overflow:hidden;
  height:38px;
  transition:border-color .18s ease,box-shadow .18s ease;
}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-box input{
  border:none;outline:none;
  font-size:.85rem;
  padding:0 .85rem;
  width:200px;
  background:var(--white);
  color:var(--text);
  height:100%;
}
.search-box button{
  border:none;
  border-left:1px solid var(--border);
  background:var(--accent);color:#fff;
  padding:0 .85rem;height:100%;
  cursor:pointer;font-size:.85rem;
  transition:background .15s;
}
.search-box button:hover{background:var(--alite)}

/* ════════════════════════════════════════════════════════
   PAGE LAYOUT
   ════════════════════════════════════════════════════════ */
.page{max-width:var(--max-w);margin:0 auto;padding:2rem var(--pad) 4rem}
.page.two-col{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:2rem;
  align-items:start;
}

.sec-title{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--accent);
  padding-bottom:.75rem;
  margin-bottom:1.25rem;
}
.sec-title h2{
  font-family:var(--ff);
  font-size:1.15rem;font-weight:700;
  color:var(--adark);
  display:flex;align-items:center;gap:.5rem;
}
.sec-title .s-cnt{
  font-family:var(--fs);
  font-size:.72rem;
  color:var(--mu);
  font-weight:400;
}

/* ════════════════════════════════════════════════════════
   ALERT BANNER (pinned at top)
   ════════════════════════════════════════════════════════ */
.alert-banner{
  background:#fffaf0;
  border:1.5px solid #e8c96a;
  border-left:4px solid var(--gold);
  border-radius:var(--r);
  padding:.95rem 1.15rem;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:.9rem;
  align-items:center;
  margin-bottom:1.5rem;
  animation:fadeDown .4s ease;
}
.ab-ico{font-size:1.15rem;display:flex;align-items:center;justify-content:center}
.ab-lbl{font-size:.65rem;font-weight:700;letter-spacing:.08em;color:#9a7520;margin-bottom:.2rem;text-transform:uppercase}
.ab-title{font-size:.93rem;font-weight:600;color:var(--text);line-height:1.4}
.ab-desc{font-size:.8rem;color:var(--tm);margin-top:.18rem;line-height:1.55}
.ab-admin-actions{display:none;gap:.4rem;align-items:center}
.ab-admin-actions.show{display:flex}
.ab-act-btn{
  width:30px;height:30px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--white);
  color:var(--mu);
  cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.78rem;line-height:1;
  transition:all .15s ease;
}
.ab-act-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.ab-act-btn.unpin:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}

/* ════════════════════════════════════════════════════════
   TAGS — colour-coded
   ════════════════════════════════════════════════════════ */
.tag{
  font-size:.6rem;
  font-weight:700;
  letter-spacing:.06em;
  padding:.2rem .6rem;
  border-radius:2px;
  display:inline-block;
  line-height:1.3;
}
.t-ann{background:#e8f0fe;color:#1a4a8a}
.t-pol{background:#fce8e8;color:#b42020}
.t-not{background:#fff3e0;color:#8c5500}
.t-sch{background:#e8f5e9;color:#2e6b32}
.t-sec{background:#fce4ec;color:#880e2e}
.t-tra{background:#ede7f6;color:#4a1d96}
.t-gen{background:#eef1f7;color:#6b7385}

/* ════════════════════════════════════════════════════════
   ARTICLE CARDS — symmetric grid, fixed date typography
   ════════════════════════════════════════════════════════ */
.articles{display:flex;flex-direction:column;gap:.6rem}
.a-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  display:grid;
  grid-template-columns:88px 1fr auto;
  align-items:stretch;
  overflow:hidden;
  transition:box-shadow .18s,transform .15s,border-color .18s;
  animation:fadeUp .35s ease both;
}
.a-card.pinned-card{
  border-color:var(--gold);
  border-left:4px solid var(--gold);
}
.a-card:hover{box-shadow:var(--s2);border-color:var(--bm);transform:translateY(-1px)}
.a-card.pinned-card:hover{border-color:var(--gold)}

.a-date{
  background:var(--accent);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:.95rem .5rem;
  cursor:pointer;
  text-align:center;
  position:relative;
}
.a-pinned-badge{
  position:absolute;
  top:6px;right:6px;
  font-size:.7rem;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));
}
/* FIXED DATE TYPOGRAPHY — proper sizing & spacing */
.a-date .d-num{
  font-family:var(--ff);
  font-size:1.85rem;
  font-weight:700;
  color:#fff;
  line-height:1;
  letter-spacing:-.01em;
  margin-bottom:4px;
}
.a-date .d-mon{
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--glt);
  line-height:1;
  margin-bottom:3px;
}
.a-date .d-yr{
  font-size:.6rem;
  color:rgba(255,255,255,.55);
  font-weight:500;
  letter-spacing:.04em;
  line-height:1;
}
/* Marathi-specific: Devanagari digits are visually larger, so scale down */
body.lang-mr .a-date .d-num{font-size:1.6rem;font-weight:600}
body.lang-mr .a-date .d-mon{font-size:.6rem;letter-spacing:.04em;text-transform:none}

.a-body{
  padding:.95rem 1.1rem;
  display:flex;flex-direction:column;
  justify-content:center;gap:.35rem;
  cursor:pointer;
  flex:1;
  min-width:0;
}
.a-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.a-author{font-size:.72rem;color:var(--mu)}
.a-body h3{
  font-size:.97rem;
  font-weight:600;
  color:var(--text);
  line-height:1.4;
}
.a-body p{
  font-size:.83rem;
  color:var(--tm);
  line-height:1.55;
}

/* CARD ACTION BUTTONS — symmetric, light */
.a-actions{
  display:flex;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:.35rem;
  padding:.7rem .6rem;
  opacity:0;
  transition:opacity .18s;
}
.a-card:hover .a-actions{opacity:1}
.a-act-btn{
  width:30px;height:30px;
  border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background:var(--white);
  cursor:pointer;
  display:inline-flex;
  align-items:center;justify-content:center;
  font-size:.78rem;line-height:1;
  padding:0;
  transition:all .15s ease;
  color:var(--mu);
}
.a-act-btn:hover.edit{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.a-act-btn:hover.del{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.a-act-btn:hover.pin{border-color:var(--gold);color:var(--gold);background:#fffaf0}

.built-in-badge{
  font-size:.58rem;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--mu);
  padding:.12rem .42rem;
  border-radius:2px;
  letter-spacing:.05em;
  font-weight:500;
}

/* ════════════════════════════════════════════════════════
   SIDEBAR — symmetric stat grid + KPI cards
   ════════════════════════════════════════════════════════ */
.sb-block{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:1.25rem;
  box-shadow:var(--s1);
}
.sb-head{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:.65rem 1rem;
}
.sb-head span{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:.06em;
  color:var(--adark);
  text-transform:uppercase;
}
.sb-body{padding:.9rem 1rem}

/* Stat grid — 2x2 symmetric */
.stat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.55rem;
}
.stat-cell{
  background:var(--off);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:.75rem .55rem;
  text-align:center;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  min-height:72px;
}
.sc-num{
  font-family:var(--ff);
  font-size:1.45rem;
  font-weight:700;
  color:var(--accent);
  line-height:1.1;
}
body.lang-mr .sc-num{font-size:1.25rem;font-weight:600}
.sc-lbl{
  font-size:.62rem;
  color:var(--mu);
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-top:3px;
  font-weight:500;
}
body.lang-mr .sc-lbl{text-transform:none;letter-spacing:.02em;font-size:.7rem}

/* KPI BLOCK — visitor stats */
.kpi-block{
  background:linear-gradient(135deg,var(--accent-soft) 0%,var(--accent-soft2) 100%);
  border:1.5px solid var(--accent);
  border-radius:var(--r);
  padding:1rem 1.1rem;
  margin-bottom:1.25rem;
  display:grid;
  grid-template-columns:1fr;
  gap:.7rem;
  box-shadow:var(--s1);
}
.kpi-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:.7rem;
  align-items:center;
  padding:.5rem .7rem;
  background:rgba(255,255,255,.7);
  border-radius:var(--r-sm);
  border:1px solid rgba(26,74,138,.1);
}
.kpi-ico{
  width:30px;height:30px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;
  flex-shrink:0;
}
.kpi-text{display:flex;flex-direction:column;min-width:0}
.kpi-label{
  font-size:.6rem;
  color:var(--mu);
  text-transform:uppercase;
  letter-spacing:.07em;
  font-weight:600;
  line-height:1.1;
}
body.lang-mr .kpi-label{text-transform:none;letter-spacing:.02em;font-size:.65rem}
.kpi-val{
  font-family:var(--ff);
  font-size:1.15rem;
  font-weight:700;
  color:var(--adark);
  line-height:1.2;
  margin-top:2px;
}
body.lang-mr .kpi-val{font-size:1rem}
.kpi-trend{
  font-size:.7rem;
  font-weight:600;
  padding:.18rem .45rem;
  border-radius:3px;
  background:var(--green-soft);
  color:var(--green);
  letter-spacing:.01em;
  display:flex;align-items:center;gap:.2rem;
  white-space:nowrap;
}
.kpi-trend.down{background:var(--red-soft);color:var(--red)}

/* Quick links */
.ql{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem 0;
  border-bottom:1px solid var(--border);
  font-size:.83rem;color:var(--tm);
  cursor:pointer;
  transition:color .14s;
}
.ql:last-child{border-bottom:none}
.ql:hover{color:var(--accent)}
.ql-i{font-size:.95rem;width:1.2rem;flex-shrink:0;text-align:center}
.ql-a{margin-left:auto;font-size:.78rem;color:var(--bm)}

/* ════════════════════════════════════════════════════════
   NOTICES
   ════════════════════════════════════════════════════════ */
.notice-list{display:flex;flex-direction:column;gap:.6rem}
.n-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-left:4px solid var(--accent);
  border-radius:var(--r);
  padding:1rem 1.15rem;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:.95rem;
  align-items:center;
  transition:box-shadow .18s,transform .15s;
  animation:fadeUp .35s ease both;
}
.n-card:hover{box-shadow:var(--s2);transform:translateY(-1px)}
.n-card.c-pol{border-left-color:var(--red)}
.n-card.c-sch{border-left-color:var(--green)}
.n-card.c-sec{border-left-color:#880e2e}
.n-ico{
  font-size:1.4rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;flex-shrink:0;
}
.n-body{flex:1;cursor:pointer;min-width:0}
.n-body .tag{margin-bottom:.35rem}
.n-body h3{
  font-size:.97rem;font-weight:600;
  color:var(--text);margin-bottom:.22rem;line-height:1.4;
}
.n-body p{font-size:.82rem;color:var(--tm);line-height:1.55}
.n-date{font-size:.72rem;color:var(--lt);margin-top:.35rem}
.n-actions{
  display:flex;flex-direction:column;
  gap:.35rem;align-items:center;
  opacity:0;transition:opacity .18s;
}
.n-card:hover .n-actions{opacity:1}

/* ════════════════════════════════════════════════════════
   ADMIN PANEL
   ════════════════════════════════════════════════════════ */
.admin-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--s1);
}
.admin-head{
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  padding:1.1rem 1.5rem;
  display:flex;align-items:center;gap:.85rem;
}
.ah-ico{font-size:1.2rem}
.admin-head h3{font-family:var(--ff);font-size:1.05rem;font-weight:700;color:var(--adark)}
.admin-head p{font-size:.75rem;color:var(--mu);margin-top:2px}

.admin-user-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 1.5rem;
  background:var(--accent-soft);
  border-bottom:1px solid var(--border);
}
.aub-left{display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--adark);font-weight:500}
.aub-avatar{
  width:30px;height:30px;
  border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;flex-shrink:0;
}
.aub-right button{
  font-size:.75rem;font-weight:600;
  padding:.35rem .9rem;border-radius:var(--r-sm);
  border:1.5px solid var(--bm);background:#fff;color:var(--tm);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:.35rem;
}
.aub-right button:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}

.admin-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--white);
}
.adm-tab{
  flex:1;
  padding:.85rem;
  background:none;border:none;
  border-bottom:3px solid transparent;
  font-size:.83rem;font-weight:500;
  color:var(--tm);cursor:pointer;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:.45rem;
}
.adm-tab:hover{color:var(--accent);background:var(--off)}
.adm-tab.active{color:var(--adark);border-bottom-color:var(--gold);font-weight:600;background:var(--off)}

.admin-body{padding:1.5rem}

/* FORM — symmetric grid */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.15rem 1.25rem;
}
.fg-full{grid-column:1/-1}
.f-field{display:flex;flex-direction:column;gap:.35rem}
.f-field label{
  font-size:.7rem;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--tm);
}
body.lang-mr .f-field label{text-transform:none;letter-spacing:.02em;font-size:.78rem}
.f-field input,.f-field select,.f-field textarea{
  font-size:.88rem;padding:.62rem .85rem;
  border:1.5px solid var(--bm);
  border-radius:var(--r-sm);
  background:var(--white);
  color:var(--text);
  outline:none;
  transition:border-color .16s,box-shadow .16s;
  resize:vertical;
  width:100%;
}
.f-field input:focus,.f-field select:focus,.f-field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.f-field textarea{min-height:130px;line-height:1.65}
.f-hint{font-size:.7rem;color:var(--lt);margin-top:.15rem}

.fdiv{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:.25rem 0}

.pin-row{
  grid-column:1/-1;
  cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:.7rem;
  background:var(--off);
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  padding:.7rem 1rem;
  transition:border-color .15s,background .15s;
}
.pin-row:hover{border-color:var(--gold);background:#fffaf0}
.pin-box{
  width:22px;height:22px;
  border-radius:4px;
  border:2px solid var(--bm);
  background:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:.82rem;
  transition:all .14s;
  flex-shrink:0;
}
.pin-box.on{background:var(--gold);border-color:var(--gold);color:#fff}
.pin-row p{font-size:.84rem;color:var(--tm)}

.btns{
  grid-column:1/-1;
  display:flex;justify-content:flex-end;gap:.7rem;
  padding-top:.85rem;border-top:1px solid var(--border);
}
.btn{
  font-size:.83rem;font-weight:600;
  padding:.65rem 1.5rem;
  border-radius:var(--r-sm);
  cursor:pointer;
  display:inline-flex;
  align-items:center;justify-content:center;
  gap:.4rem;
  transition:all .17s;
  border:1.5px solid;
  letter-spacing:.01em;
  line-height:1;
}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:var(--alite);border-color:var(--alite)}
.btn-o{background:#fff;color:var(--tm);border-color:var(--bm)}
.btn-o:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.btn-d{background:#fff;color:var(--red);border-color:var(--red)}
.btn-d:hover{background:var(--red-soft)}

.success-row{
  display:none;grid-column:1/-1;
  background:var(--green-soft);
  border:1px solid #81c784;
  border-radius:var(--r-sm);
  padding:.7rem 1rem;
  font-size:.85rem;font-weight:500;
  color:var(--green);
  align-items:center;gap:.5rem;
}
.success-row.show{display:flex}

.edit-banner{
  background:var(--accent-soft);
  border:1.5px solid #a8c0e8;
  border-radius:var(--r-sm);
  padding:.7rem 1rem;
  font-size:.83rem;color:var(--adark);
  display:flex;align-items:center;gap:.5rem;
  grid-column:1/-1;
}

/* MANAGE TABLE */
.manage-section{padding:1.5rem}
.manage-section h4{
  font-family:var(--ff);
  font-size:.97rem;font-weight:700;
  color:var(--adark);
  margin-bottom:1rem;
  display:flex;align-items:center;gap:.45rem;
}
.manage-table{
  width:100%;
  border-collapse:collapse;
  font-size:.83rem;
}
.manage-table th{
  background:var(--surface);
  color:var(--adark);
  font-weight:700;
  font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.6rem .9rem;
  text-align:left;
  border-bottom:2px solid var(--accent);
}
body.lang-mr .manage-table th{text-transform:none;letter-spacing:.02em;font-size:.78rem}
.manage-table td{
  padding:.7rem .9rem;
  border-bottom:1px solid var(--border);
  color:var(--tm);
  vertical-align:middle;
}
.manage-table tr:last-child td{border-bottom:none}
.manage-table tr:hover td{background:var(--off)}
.manage-table .mt-title{color:var(--text);font-weight:500;max-width:300px}
.mt-btns{display:flex;gap:.45rem;white-space:nowrap;flex-wrap:wrap}
.mt-btn{
  padding:.32rem .75rem;
  border-radius:var(--r-sm);
  font-size:.72rem;font-weight:600;
  cursor:pointer;
  border:1.5px solid;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:.3rem;
  background:#fff;
}
.mt-btn.e{border-color:var(--accent);color:var(--accent)}
.mt-btn.e:hover{background:var(--accent-soft)}
.mt-btn.d{border-color:var(--red);color:var(--red)}
.mt-btn.d:hover{background:var(--red-soft)}
.mt-btn.p{border-color:var(--gold);color:var(--gold)}
.mt-btn.p:hover{background:#fffaf0}
.mt-empty{text-align:center;padding:2.5rem;color:var(--mu);font-size:.88rem}

/* PINNED INDICATOR in tables */
.mt-pinned{color:var(--gold);font-weight:600}

/* ════════════════════════════════════════════════════════
   BACKUP PANEL — symmetric grid, light cards
   ════════════════════════════════════════════════════════ */
.backup-section{padding:1.5rem}
.backup-section h4{
  font-family:var(--ff);
  font-size:.97rem;font-weight:700;
  color:var(--adark);
  margin-bottom:.4rem;
  display:flex;align-items:center;gap:.45rem;
}
.backup-intro{
  font-size:.83rem;color:var(--tm);
  margin-bottom:1.25rem;
  line-height:1.6;
}
.backup-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.25rem;
  margin-bottom:1.5rem;
}
.bk-card{
  border:1.5px solid var(--border);
  border-radius:var(--r);
  background:var(--white);
  padding:1.25rem;
  display:flex;flex-direction:column;
  box-shadow:var(--s1);
  transition:border-color .18s,box-shadow .18s;
}
.bk-card:hover{border-color:var(--bm);box-shadow:var(--s2)}
.bk-card-head{
  display:flex;align-items:center;gap:.7rem;
  margin-bottom:.85rem;
}
.bk-icon{
  width:42px;height:42px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;
  flex-shrink:0;
}
.bk-icon.export{background:var(--green-soft);color:var(--green);border:1.5px solid #81c784}
.bk-icon.import{background:var(--accent-soft);color:var(--accent);border:1.5px solid #a8c0e8}
.bk-title{
  font-family:var(--ff);
  font-size:.97rem;font-weight:700;
  color:var(--adark);
  line-height:1.3;
}
.bk-desc{
  font-size:.8rem;
  color:var(--tm);
  line-height:1.6;
  margin-bottom:1.1rem;
  flex:1;
}
.bk-btn{
  width:100%;
  justify-content:center;
  padding:.7rem 1rem;
  font-size:.85rem;font-weight:600;
}
.bk-btn.export{background:var(--green);color:#fff;border-color:var(--green)}
.bk-btn.export:hover{background:#256527;border-color:#256527}
.bk-btn.import{background:var(--accent);color:#fff;border-color:var(--accent)}
.bk-btn.import:hover{background:var(--alite);border-color:var(--alite)}

.bk-status-block{
  background:var(--off);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:1rem 1.25rem;
}
.bk-status-block h5{
  font-family:var(--ff);
  font-size:.85rem;font-weight:700;
  color:var(--adark);
  margin-bottom:.7rem;
  display:flex;align-items:center;gap:.4rem;
}
.bk-status-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:.7rem;
  align-items:center;
  padding:.55rem 0;
  border-bottom:1px dashed var(--border);
  font-size:.82rem;
}
.bk-status-row:last-child{border-bottom:none}
.bk-status-row .bs-ico{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--white);
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;
  flex-shrink:0;
}
.bk-status-row .bs-label{color:var(--tm);font-weight:500}
.bk-status-row .bs-value{
  color:var(--adark);font-weight:600;
  font-family:var(--ff);
  font-size:.85rem;
  text-align:right;
}
.bs-value.ok{color:var(--green)}
.bs-value.warn{color:var(--gold)}
.bs-value.bad{color:var(--red)}

/* Backup tips list */
.bk-tips{
  background:#fffaf0;
  border:1.5px solid #e8c96a;
  border-left:4px solid var(--gold);
  border-radius:var(--r);
  padding:1rem 1.15rem;
  margin-top:1.25rem;
}
.bk-tips h5{
  font-family:var(--ff);
  font-size:.85rem;font-weight:700;
  color:#9a7520;
  margin-bottom:.55rem;
  display:flex;align-items:center;gap:.4rem;
}
.bk-tips ul{
  list-style:none;
  padding:0;margin:0;
  font-size:.8rem;
  color:var(--tm);
  line-height:1.7;
}
.bk-tips li{
  padding-left:1.3rem;
  position:relative;
  margin-bottom:.25rem;
}
.bk-tips li::before{
  content:'✓';
  position:absolute;left:0;top:0;
  color:var(--green);
  font-weight:700;
}

/* Auto-save indicator (subtle, top-right of admin panel) */
.autosave-pill{
  display:inline-flex;
  align-items:center;gap:.35rem;
  background:var(--green-soft);
  color:var(--green);
  border:1px solid #a5d6a7;
  font-size:.7rem;
  font-weight:600;
  padding:.2rem .55rem;
  border-radius:var(--r-full);
  margin-left:.6rem;
  transition:opacity .25s;
}
.autosave-pill.saving{
  background:var(--accent-soft);
  color:var(--accent);
  border-color:#a8c0e8;
}
.autosave-pill::before{
  content:'●';
  font-size:.65rem;
  line-height:1;
}

/* Backup history table */
.bk-history{margin-top:1rem}
.bk-history-empty{
  text-align:center;padding:1.5rem;
  color:var(--mu);font-size:.85rem;
}

/* Import preview dialog */
.import-preview{
  background:var(--accent-soft);
  border:1.5px solid var(--accent);
  border-radius:var(--r);
  padding:.85rem 1rem;
  margin:.75rem 0;
  font-size:.83rem;
}
.import-preview-row{
  display:flex;justify-content:space-between;
  padding:.2rem 0;
  color:var(--tm);
}
.import-preview-row strong{color:var(--adark);font-weight:600}

/* Hidden file input */
.bk-file-input{display:none}

@media(max-width:680px){
  .backup-grid{grid-template-columns:1fr;gap:.85rem}
}

/* ════════════════════════════════════════════════════════
   SIGN-IN MODAL
   ════════════════════════════════════════════════════════ */
.signin-ov{
  display:none;position:fixed;inset:0;
  background:rgba(15,47,94,.5);
  z-index:300;align-items:center;justify-content:center;
  padding:1.5rem;
  backdrop-filter:blur(5px);
}
.signin-ov.open{display:flex}
.signin-box{
  background:var(--white);width:100%;max-width:400px;
  border-radius:var(--r);
  box-shadow:var(--s3);
  border:1.5px solid var(--border);
  overflow:hidden;
  animation:modalIn .22s ease;
}
.signin-head{
  background:var(--accent);
  padding:1.5rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
}
.sh-seal{font-size:2rem}
.signin-head h2{font-family:var(--ff);font-size:1.05rem;font-weight:700;color:#fff;text-align:center}
.signin-head p{font-size:.74rem;color:rgba(255,255,255,.7);text-align:center}
.signin-body{padding:1.5rem}
.signin-field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1.1rem}
.signin-field label{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tm)}
body.lang-mr .signin-field label{text-transform:none;letter-spacing:.02em;font-size:.78rem}
.signin-field input{
  font-size:.92rem;padding:.7rem .9rem;
  border:1.5px solid var(--bm);
  border-radius:var(--r-sm);
  background:var(--off);color:var(--text);
  outline:none;
  transition:border-color .16s,box-shadow .16s;
}
.signin-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pw-wrap{position:relative}
.pw-wrap input{width:100%;padding-right:2.6rem}
.pw-toggle{
  position:absolute;right:.8rem;top:50%;
  transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--mu);font-size:.9rem;
  transition:color .15s;padding:.2rem;
}
.pw-toggle:hover{color:var(--accent)}
.signin-error{
  display:none;background:var(--red-soft);
  border:1px solid #f5b5b5;border-radius:var(--r-sm);
  padding:.65rem .9rem;font-size:.82rem;color:var(--red);
  margin-bottom:1rem;align-items:center;gap:.45rem;
}
.signin-error.show{display:flex}
.btn-signin{width:100%;justify-content:center;font-size:.9rem;padding:.75rem}
.signin-cancel{
  background:none;border:none;
  font-size:.8rem;color:var(--mu);
  cursor:pointer;text-align:center;
  transition:color .15s;padding:.3rem;width:100%;
  margin-top:.55rem;
}
.signin-cancel:hover{color:var(--accent)}
.signin-note{
  text-align:center;font-size:.7rem;
  color:var(--lt);margin-top:.85rem;
  padding-top:.85rem;border-top:1px solid var(--border);
}

/* ════════════════════════════════════════════════════════
   CONFIRM MODAL
   ════════════════════════════════════════════════════════ */
.confirm-ov{
  display:none;position:fixed;inset:0;
  background:rgba(15,47,94,.45);
  z-index:400;align-items:center;justify-content:center;
  padding:1.5rem;backdrop-filter:blur(4px);
}
.confirm-ov.open{display:flex}
.confirm-box{
  background:var(--white);max-width:400px;width:100%;
  border-radius:var(--r);box-shadow:var(--s3);
  border:1.5px solid var(--border);overflow:hidden;
  animation:modalIn .2s ease;
}
.confirm-head{
  background:var(--red-soft);
  border-bottom:2px solid var(--red);
  padding:.95rem 1.25rem;
  display:flex;align-items:center;gap:.55rem;
}
.confirm-head span{font-size:1.05rem}
.confirm-head h3{font-family:var(--ff);font-size:.97rem;font-weight:700;color:var(--red)}
.confirm-body{padding:1.2rem 1.25rem;font-size:.88rem;color:var(--tm);line-height:1.6}
.confirm-body strong{color:var(--text)}
.confirm-foot{
  padding:.9rem 1.25rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:.65rem;
  background:var(--off);
}

/* ════════════════════════════════════════════════════════
   CONTENT MODAL (article/notice viewer)
   ════════════════════════════════════════════════════════ */
.modal-ov{
  display:none;position:fixed;inset:0;
  background:rgba(15,47,94,.45);
  z-index:200;align-items:center;justify-content:center;
  padding:1.5rem;backdrop-filter:blur(4px);
}
.modal-ov.open{display:flex}
.modal{
  background:var(--white);max-width:700px;width:100%;max-height:88vh;
  border-radius:var(--r);box-shadow:var(--s3);
  display:flex;flex-direction:column;
  animation:modalIn .2s ease;border:1.5px solid var(--border);
}
@keyframes modalIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.m-head{
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  padding:1.2rem 1.5rem;
  display:flex;align-items:flex-start;gap:1rem;
  flex-shrink:0;
}
.m-head-txt{flex:1;min-width:0}
.m-head-txt .m-tag{margin-bottom:.4rem}
.m-head-txt h2{
  font-family:var(--ff);
  font-size:1.15rem;font-weight:700;
  color:var(--adark);line-height:1.4;
}
.m-head-txt .m-meta{font-size:.73rem;color:var(--mu);margin-top:.35rem}
.m-close{
  background:var(--border);border:none;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--tm);cursor:pointer;font-size:.82rem;
  flex-shrink:0;transition:background .15s;
}
.m-close:hover{background:var(--bm);color:var(--accent)}
.m-body{
  padding:1.5rem;overflow-y:auto;flex:1;
  font-size:.94rem;color:var(--text);line-height:1.85;
}
.m-body p+p{margin-top:.85em}
.m-foot{
  padding:.9rem 1.5rem;
  border-top:1px solid var(--border);
  background:var(--off);
  display:flex;justify-content:flex-end;gap:.7rem;
  flex-shrink:0;
}

/* ════════════════════════════════════════════════════════
   NO RESULTS
   ════════════════════════════════════════════════════════ */
.no-res{text-align:center;padding:3rem 1rem;color:var(--mu)}
.no-res .nr-i{font-size:2rem;margin-bottom:.6rem;opacity:.7}

/* ════════════════════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════════════════════ */
footer{
  background:var(--surface);
  border-top:2px solid var(--accent);
}

/* ════════════════════════════════════════════════
   PINNED ALERT
   ════════════════════════════════════════════════ */
function renderPinnedAlert(){
  const l=L();
  if(!pinnedAlert.show){$('pinned-alert').style.display='none';return;}
  // Resolve content source
  let lbl='',title='',desc='';
  if(pinnedAlert.itemType==='article'&&pinnedAlert.itemId){
    const a=allArt().find(x=>x.id===pinnedAlert.itemId);
    if(a){lbl=lang==='en'?'PINNED ARTICLE':'पिन केलेला लेख';title=a.title;desc=a.summary;}
  } else if(pinnedAlert.itemType==='notice'&&pinnedAlert.itemId){
    const n=allNot().find(x=>x.id===pinnedAlert.itemId);
    if(n){lbl=lang==='en'?'PINNED NOTICE':'पिन केलेली नोटीस';title=n.title;desc=n.summary;}
  } else {
    // Default editorial pinned alert
    lbl=pinnedAlert[lang].lbl;title=pinnedAlert[lang].title;desc=pinnedAlert[lang].desc;
  }
  if(!title){$('pinned-alert').style.display='none';return;}
  $('pinned-alert').style.display='grid';
  st('albl',lbl);st('atitle',title);st('adesc',desc);
  // Show edit/unpin buttons only when admin is logged in
  $('ab-actions').classList.toggle('show',loggedIn);
  sat('abe-tip','title',l.mtEdit);
  sat('abu-tip','title',l.mtUnpin);
}
function unpinAlert(){
  if(pinnedAlert.itemType&&pinnedAlert.itemId){
    // Unpin the underlying article/notice too
    const id=pinnedAlert.itemId;
    if(pinnedAlert.itemType==='article'){
      const idx=custArt[lang].findIndex(a=>a.id===id);
      if(idx>=0)custArt[lang][idx].isPinned=false;
      const bidx=BUILT_ART[lang].findIndex(a=>a.id===id);
      if(bidx>=0)BUILT_ART[lang][bidx].isPinned=false;
    } else {
      const idx=custNot[lang].findIndex(n=>n.id===id);
      if(idx>=0)custNot[lang][idx].isPinned=false;
      const bidx=BUILT_NOT[lang].findIndex(n=>n.id===id);
      if(bidx>=0)BUILT_NOT[lang][bidx].isPinned=false;
    }
  }
  pinnedAlert.show=false;
  pinnedAlert.itemType=null;pinnedAlert.itemId=null;
  renderPinnedAlert();
  renderArticles(allArt());renderNotices(allNot());
  if($('ap-art').style.display!=='none')renderManageArt();
  if($('ap-not').style.display!=='none')renderManageNot();
}
function editPinned(){
  if(pinnedAlert.itemType==='article'&&pinnedAlert.itemId){
    handleAdminTab($('nav-admin-btn'));
    if(loggedIn)setTimeout(()=>startEditArticle(pinnedAlert.itemId),100);
  } else if(pinnedAlert.itemType==='notice'&&pinnedAlert.itemId){
    handleAdminTab($('nav-admin-btn'));
    if(loggedIn)setTimeout(()=>startEditNotice(pinnedAlert.itemId),100);
  } else {
    // Editorial alert — open a simple prompt; in production this would be a proper editor
    const newTitle=prompt(lang==='en'?'Edit pinned alert title:':'पिन केलेले शीर्षक संपादित करा:',pinnedAlert[lang].title);
    if(newTitle===null)return;
    const newDesc=prompt(lang==='en'?'Edit description:':'वर्णन संपादित करा:',pinnedAlert[lang].desc);
    if(newDesc===null)return;
    pinnedAlert[lang].title=newTitle;
    pinnedAlert[lang].desc=newDesc;
    renderPinnedAlert();
  }
}

/* ════════════════════════════════════════════════
   PIN / UNPIN ITEMS
   ════════════════════════════════════════════════ */
function togglePinItem(type,id){
  if(type==='article'){
    const cIdx=custArt[lang].findIndex(a=>a.id===id);
    const bIdx=BUILT_ART[lang].findIndex(a=>a.id===id);
    const item=cIdx>=0?custArt[lang][cIdx]:(bIdx>=0?BUILT_ART[lang][bIdx]:null);
    if(!item)return;
    const newState=!item.isPinned;
    // Unpin all others first (only one item pinned at a time)
    if(newState){
      custArt[lang].forEach(a=>a.isPinned=false);
      BUILT_ART[lang].forEach(a=>a.isPinned=false);
      custNot[lang].forEach(n=>n.isPinned=false);
      BUILT_NOT[lang].forEach(n=>n.isPinned=false);
    }
    item.isPinned=newState;
    pinnedAlert.itemType=newState?'article':null;
    pinnedAlert.itemId=newState?id:null;
    pinnedAlert.show=newState||pinnedAlert.show;
    if(!newState&&pinnedAlert.itemId===id){pinnedAlert.itemType=null;pinnedAlert.itemId=null;}
  } else {
    const cIdx=custNot[lang].findIndex(n=>n.id===id);
    const bIdx=BUILT_NOT[lang].findIndex(n=>n.id===id);
    const item=cIdx>=0?custNot[lang][cIdx]:(bIdx>=0?BUILT_NOT[lang][bIdx]:null);
    if(!item)return;
    const newState=!item.isPinned;
    if(newState){
      custArt[lang].forEach(a=>a.isPinned=false);
      BUILT_ART[lang].forEach(a=>a.isPinned=false);
      custNot[lang].forEach(n=>n.isPinned=false);
      BUILT_NOT[lang].forEach(n=>n.isPinned=false);
    }
    item.isPinned=newState;
    pinnedAlert.itemType=newState?'notice':null;
    pinnedAlert.itemId=newState?id:null;
    pinnedAlert.show=newState||pinnedAlert.show;
    if(!newState&&pinnedAlert.itemId===id){pinnedAlert.itemType=null;pinnedAlert.itemId=null;}
  }
  renderPinnedAlert();
  renderArticles(allArt());
  renderNotices(allNot());
  if($('ap-art').style.display!=='none')renderManageArt();
  if($('ap-not').style.display!=='none')renderManageNot();
}

function renderArticles(list){
  const el=$('alist'),nr=$('no-res');
  const l=L();
  $('acnt').textContent=`(${list.length})`;
  $('sta').textContent=l.nf(allArt().length);
  if(!list.length){el.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  el.innerHTML=list.map((a,i)=>{
    const custom=isCustomArt(a.id);
    const safeTitle=escAttr(a.title);
    const pinIcon=a.isPinned?'<div class="a-pinned-badge">📌</div>':'';
    const cardClass=a.isPinned?'a-card pinned-card':'a-card';
    const actBtns=loggedIn?`
      <div class="a-actions">
        <button class="a-act-btn pin" onclick="event.stopPropagation();togglePinItem('article','${a.id}')" title="${a.isPinned?l.mtUnpin:l.mtPin}">${a.isPinned?'📍':'📌'}</button>

function showTab(id,btn){
  ['board','notices','admin'].forEach(t=>$(t).style.display=t===id?'block':'none');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-admin-btn').classList.toggle('active',id==='admin');
  if(btn&&btn.classList&&btn.classList.contains('nav-btn'))btn.classList.add('active');
  $('srch').value='';
  renderArticles(allArt());
}
function handleAdminTab(btn){
  if(loggedIn){showTab('admin',btn);}
  else{window._pendBtn=btn;openSignIn();}
}
function switchAdminTab(id,btn){
  ['ap-post','ap-art','ap-not','ap-bk'].forEach(p=>$(p).style.display='none');
  $(`ap-${id}`).style.display='block';
  document.querySelectorAll('.adm-tab').forEach(b=>b.classList.remove('active'));
  (btn||$(`atab-${id}`)).classList.add('active');
  if(id==='art')renderManageArt();
  if(id==='not')renderManageNot();
  if(id==='bk')updateBackupStatus();
}

   ════════════════════════════════════════════════ */
function doSearch(q){
  const s=q.toLowerCase().trim();
  const res=s?allArt().filter(a=>
    a.title.toLowerCase().includes(s)||a.summary.toLowerCase().includes(s)||
    (a.tag||'').toLowerCase().includes(s)||(a.author||'').toLowerCase().includes(s)
  ):allArt();
  renderArticles(res);
  $('board').style.display='block';
  $('notices').style.display='none';
  $('admin').style.display='none';
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  $('nav-admin-btn').classList.remove('active');
}

/* ════════════════════════════════════════════════
   EDIT
   ════════════════════════════════════════════════ */
function startEditArticle(id){
  const a=allArt().find(x=>x.id===id);if(!a)return;
  switchAdminTab('post',$('atab-post'));
  editingId=id;editingType='article';
  $('f-type').value='article';
  $('nc-row').style.display='none';
  $('f-title').value=a.title;
  // Set category — add option if missing
  const sel=$('f-cat');let found=false;
  for(let o of sel.options){if(o.value===a.tag){sel.value=a.tag;found=true;break;}}
  if(!found&&a.tag){const opt=document.createElement('option');opt.value=a.tag;opt.textContent=a.tag;sel.appendChild(opt);sel.value=a.tag;}
  $('f-author').value=a.author||'';
  $('f-summary').value=a.summary||'';
  // Strip trailing signature
  let body=a.body||'';
  const sig=`\n\n— ${a.author}`;
  if(body.endsWith(sig))body=body.slice(0,-sig.length);
  $('f-body').value=body;
  $('f-ref').value='';
  $('f-date').value=parseDateForInput(a.day,a.mon,a.yr)||new Date().toISOString().split('T')[0];
  pinned=!!a.isPinned;
  const pb=$('pin-box');pb.classList.toggle('on',pinned);pb.textContent=pinned?'✓':'📌';
  $('edit-banner').style.display='flex';
  $('edit-banner-txt').textContent=`${L().mtEdit}: "${a.title}"`;
  $('bcan').style.display='inline-flex';
  sh('bpub',lang==='en'?'✔ Save Changes':'✔ बदल जतन करा');
  setTimeout(()=>document.querySelector('.admin-card').scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function startEditNotice(id){
  const n=allNot().find(x=>x.id===id);if(!n)return;
  switchAdminTab('post',$('atab-post'));
  editingId=id;editingType='notice';
  $('f-type').value='notice';
  $('nc-row').style.display='flex';
  $('f-ncls').value=n.cls||'';
  $('f-title').value=n.title;
  const sel=$('f-cat');let found=false;
  for(let o of sel.options){if(o.value===n.tag){sel.value=n.tag;found=true;break;}}
  if(!found&&n.tag){const opt=document.createElement('option');opt.value=n.tag;opt.textContent=n.tag;sel.appendChild(opt);sel.value=n.tag;}
  $('f-author').value=n.author||'';
  $('f-summary').value=n.summary||'';
  $('f-body').value=n.body||'';
  $('f-ref').value='';
  $('f-date').value=new Date().toISOString().split('T')[0];
  pinned=!!n.isPinned;
  const pb=$('pin-box');pb.classList.toggle('on',pinned);pb.textContent=pinned?'✓':'📌';
  $('edit-banner').style.display='flex';
  $('edit-banner-txt').textContent=`${L().mtEdit}: "${n.title}"`;
  $('bcan').style.display='inline-flex';
  sh('bpub',lang==='en'?'✔ Save Changes':'✔ बदल जतन करा');
  setTimeout(()=>document.querySelector('.admin-card').scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function parseDateForInput(day,mon,yr){
  try{
    const toA=s=>String(s).replace(/[०-९]/g,d=>'०१२३४५६७८९'.indexOf(d));
    const D=parseInt(toA(day),10);
    const Y=parseInt(toA(yr),10);
    const all=[].concat(T.en.months,T.en.ms,T.mr.months,T.mr.ms);
    let M=-1;[T.en.months,T.en.ms,T.mr.months,T.mr.ms].forEach(arr=>{const idx=arr.indexOf(mon);if(idx>=0)M=idx%12;});
    if(isNaN(D)||isNaN(Y)||M<0)return null;
    return`${Y}-${String(M+1).padStart(2,'0')}-${String(D).padStart(2,'0')}`;
  }catch(e){return null;}
}
function cancelEdit(){
  editingId=null;editingType=null;
  $('edit-banner').style.display='none';
  $('bcan').style.display='none';
  sh('bpub',L().bpub);
  clearForm();
}

/* ════════════════════════════════════════════════
   DELETE
   ════════════════════════════════════════════════ */
function askDelete(type,id,title){
  deletePending={type,id};
  const l=L();
  $('cfm-b').innerHTML=`${l.confirmDel}<br><br><strong>"${title}"</strong><br><br>${l.cannotUndo}`;
  $('confirm-ov').classList.add('open');
}
function closeConfirm(){$('confirm-ov').classList.remove('open');deletePending=null;}
function confirmDeleteAction(){
  if(!deletePending)return;
  const{type,id}=deletePending;
  if(type==='article'){
    if(isCustomArt(id))custArt[lang]=custArt[lang].filter(a=>a.id!==id);
    else if(isBuiltInArt(id))hiddenArt[lang].add(id);
    // If this item was the pinned alert source, clear it
    if(pinnedAlert.itemType==='article'&&pinnedAlert.itemId===id){
      pinnedAlert.itemType=null;pinnedAlert.itemId=null;pinnedAlert.show=false;
    }
    renderArticles(allArt());
  } else {
    if(isCustomNot(id))custNot[lang]=custNot[lang].filter(n=>n.id!==id);
    else if(isBuiltInNot(id))hiddenNot[lang].add(id);
    if(pinnedAlert.itemType==='notice'&&pinnedAlert.itemId===id){
      pinnedAlert.itemType=null;pinnedAlert.itemId=null;pinnedAlert.show=false;
    }
    renderNotices(allNot());
  }
  $('sta').textContent=L().nf(allArt().length);
  $('stn').textContent=L().nf(allNot().length);
  closeConfirm();
  renderPinnedAlert();
  if($('ap-art').style.display!=='none')renderManageArt();
  if($('ap-not').style.display!=='none')renderManageNot();
}

/* ════════════════════════════════════════════════
   PUBLISH / SAVE
   ════════════════════════════════════════════════ */
function togglePin(){pinned=!pinned;const b=$('pin-box');b.classList.toggle('on',pinned);b.textContent=pinned?'✓':'📌';}
$('f-type').addEventListener('change',function(){$('nc-row').style.display=this.value==='notice'?'flex':'none';});
function publishItem(){
  const l=L();
  const title=$('f-title').value.trim();
  const cat=$('f-cat').value;
  const author=$('f-author').value.trim()||l.da;
  const summary=$('f-summary').value.trim();
  const body=$('f-body').value.trim();
  const dateVal=$('f-date').value;
  const type=$('f-type').value;
  if(!title||!summary||!body){alert(l.ar);return;}
  const d=dateVal?new Date(dateVal+'T12:00:00'):new Date();
  const nf=l.nf,ms=l.ms;

  if(editingId&&editingType){
    // SAVE EDIT
    if(editingType==='article'){
      const customIdx=custArt[lang].findIndex(a=>a.id===editingId);
      if(customIdx>=0){
        custArt[lang][customIdx]={
          ...custArt[lang][customIdx],
          day:nf(d.getDate()),mon:ms[d.getMonth()],yr:nf(d.getFullYear()),
          title,tag:cat,tagKey:resolveTagKey(cat),
          author,summary,body,
          isPinned:pinned
        };
      } else if(isBuiltInArt(editingId)){
        hiddenArt[lang].add(editingId);
        custArt[lang].unshift({
          id:'ce'+Date.now(),
          day:nf(d.getDate()),mon:ms[d.getMonth()],yr:nf(d.getFullYear()),
          title,tag:cat,tagKey:resolveTagKey(cat),
          author,summary,body,
          isPinned:pinned
        });
      }
      // Update pinned-alert state
      if(pinned){
        // Make this the pinned item
        custArt[lang].concat(BUILT_ART[lang]).forEach(a=>{if(a.id!==editingId&&a.id!=='ce'+Date.now())a.isPinned=false;});
        custNot[lang].concat(BUILT_NOT[lang]).forEach(n=>n.isPinned=false);
        pinnedAlert.itemType='article';
        const finalId=customIdx>=0?editingId:custArt[lang][0].id;
        pinnedAlert.itemId=finalId;
        pinnedAlert.show=true;
      } else if(pinnedAlert.itemType==='article'&&pinnedAlert.itemId===editingId){
        pinnedAlert.itemType=null;pinnedAlert.itemId=null;
      }
      renderArticles(allArt());
    } else {
      const ncls=$('f-ncls').value;
      const ico=nIco(ncls,cat);
      const customIdx=custNot[lang].findIndex(n=>n.id===editingId);
      if(customIdx>=0){
        custNot[lang][customIdx]={
          ...custNot[lang][customIdx],
          title,tag:cat,tagKey:resolveTagKey(cat),
          author,summary,body,cls:ncls,ico,
          date:fmtDate(d),isPinned:pinned
        };
      } else if(isBuiltInNot(editingId)){
        hiddenNot[lang].add(editingId);
        custNot[lang].unshift({
          id:'ne'+Date.now(),cls:ncls,ico,
          tag:cat,tagKey:resolveTagKey(cat),
          title,summary,body,date:fmtDate(d),author,isPinned:pinned
        });
      }
      if(pinned){
        custArt[lang].concat(BUILT_ART[lang]).forEach(a=>a.isPinned=false);
        custNot[lang].concat(BUILT_NOT[lang]).forEach(n=>{if(n.id!==editingId)n.isPinned=false;});
        pinnedAlert.itemType='notice';
        const finalId=customIdx>=0?editingId:custNot[lang][0].id;
        pinnedAlert.itemId=finalId;
        pinnedAlert.show=true;
      } else if(pinnedAlert.itemType==='notice'&&pinnedAlert.itemId===editingId){
        pinnedAlert.itemType=null;pinnedAlert.itemId=null;
      }
      renderNotices(allNot());
    }
    cancelEdit();
  } else {
    // NEW POST
    const newId=(type==='notice'?'n':'a')+Date.now();
    if(pinned){
      custArt[lang].concat(BUILT_ART[lang]).forEach(a=>a.isPinned=false);
      custNot[lang].concat(BUILT_NOT[lang]).forEach(n=>n.isPinned=false);
    }
    if(type==='notice'){
      const ncls=$('f-ncls').value;
      const ico=nIco(ncls,cat);
      custNot[lang].unshift({
        id:newId,cls:ncls,ico,
        tag:cat,tagKey:resolveTagKey(cat),
        title,summary,body:body+`\n\n— ${author}`,
        date:fmtDate(d),author,isPinned:pinned
      });
      if(pinned){pinnedAlert.itemType='notice';pinnedAlert.itemId=newId;pinnedAlert.show=true;}
      renderNotices(allNot());
    } else {
      custArt[lang].unshift({
        id:newId,
        day:nf(d.getDate()),mon:ms[d.getMonth()],yr:nf(d.getFullYear()),
        tag:cat,tagKey:resolveTagKey(cat),
        title,summary,body:body+`\n\n— ${author}`,author,isPinned:pinned
      });
      if(pinned){pinnedAlert.itemType='article';pinnedAlert.itemId=newId;pinnedAlert.show=true;}
      renderArticles(allArt());
    }
    clearForm();
  }

  $('sta').textContent=l.nf(allArt().length);
  $('stn').textContent=l.nf(allNot().length);
  const sr=$('srow');sr.classList.add('show');setTimeout(()=>sr.classList.remove('show'),4000);
  if($('ap-art').style.display!=='none')renderManageArt();
  if($('ap-not').style.display!=='none')renderManageNot();
  renderPinnedAlert();

  const wasNotice=editingType==='notice';
  if(type==='notice'||wasNotice){showTab('notices',document.querySelectorAll('.nav-btn')[1]);}
  else{showTab('board',document.querySelectorAll('.nav-btn')[0]);}
}
function clearForm(){
  ['f-title','f-author','f-summary','f-body','f-ref'].forEach(id=>{const e=$(id);if(e)e.value='';});
  $('f-cat').selectedIndex=0;
  $('f-type').value='article';$('f-ncls').value='';
  $('nc-row').style.display='none';
  pinned=false;
  const b=$('pin-box');b.classList.remove('on');b.textContent='📌';
}

  $('stm').textContent=l.ms[d.getMonth()];
}

/* ════════════════════════════════════════════════
   GLOBAL KEYBOARD
   ════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeSignIn();closeConfirm();closeImportPreview();}
});

/* ════════════════════════════════════════════════
   ▒▒▒▒▒▒▒▒▒▒  BACKUP & RESTORE SYSTEM  ▒▒▒▒▒▒▒▒▒▒
   Layer 1: localStorage auto-save (invisible safety net)
   Layer 2: Excel export/import (manual weekly backup)
   ════════════════════════════════════════════════ */

const LS_KEY='court-portal-data-v1';
let lastExportDate=null;
let pendingImportData=null;
let saveTimer=null;

// ── LAYER 1: AUTO-SAVE TO BROWSER LOCALSTORAGE ──
function saveToLocal(){
  try{
    const snapshot={
      v:1, // schema version
      custArt, custNot,
      hiddenArt:{en:[...hiddenArt.en],mr:[...hiddenArt.mr]},
      hiddenNot:{en:[...hiddenNot.en],mr:[...hiddenNot.mr]},
      pinnedAlert,
      lastExportDate,
      savedAt:new Date().toISOString()
    };
    localStorage.setItem(LS_KEY,JSON.stringify(snapshot));
    showAutoSavePill();
    updateBackupStatus();
  } catch(e){
    console.warn('localStorage save failed:',e);
  }
}

function loadFromLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const s=JSON.parse(raw);
    if(s.v!==1) return false; // schema mismatch
    if(s.custArt) custArt=s.custArt;
    if(s.custNot) custNot=s.custNot;
    if(s.hiddenArt){
      hiddenArt={en:new Set(s.hiddenArt.en||[]),mr:new Set(s.hiddenArt.mr||[])};
    }
    if(s.hiddenNot){
      hiddenNot={en:new Set(s.hiddenNot.en||[]),mr:new Set(s.hiddenNot.mr||[])};
    }
    if(s.pinnedAlert) pinnedAlert=s.pinnedAlert;
    if(s.lastExportDate) lastExportDate=s.lastExportDate;
    return true;
  } catch(e){
    console.warn('localStorage load failed:',e);
    return false;
  }
}

// Debounced auto-save — fires 600ms after the last change
function scheduleAutoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToLocal,600);
}

// Pill animation
function showAutoSavePill(){
  const pill=$('autosave-pill');
  if(!pill) return;
  pill.style.display='inline-flex';
  pill.classList.add('saving');
  pill.textContent='● '+L().autosaving;
  setTimeout(()=>{
    pill.classList.remove('saving');
    pill.textContent='● '+L().autosaved;
    setTimeout(()=>{pill.style.display='none';},2000);
  },350);
}

// ── LAYER 2: EXCEL EXPORT ──
function exportToExcel(){
  try{
    const wb=XLSX.utils.book_new();
    const today=new Date();
    const dateStr=today.toISOString().split('T')[0];

    // Helper to flatten an article/notice to a row
    const artRow=(a,language)=>({
      ID:a.id,
      Language:language,
      Title:a.title||'',
      Category:a.tag||'',
      CategoryKey:a.tagKey||'',
      Author:a.author||'',
      Day:a.day||'',
      Month:a.mon||'',
      Year:a.yr||'',
      Summary:a.summary||'',
      Body:a.body||'',
      Pinned:a.isPinned?'YES':'NO',
      Source: isCustomArtInLang(a.id,language)?'Custom':'Built-in'
    });
    const notRow=(n,language)=>({
      ID:n.id,
      Language:language,
      Title:n.title||'',
      Category:n.tag||'',
      CategoryKey:n.tagKey||'',
      Author:n.author||'',
      Date:n.date||'',
      ColourClass:n.cls||'',
      Icon:n.ico||'',
      Summary:n.summary||'',
      Body:n.body||'',
      Pinned:n.isPinned?'YES':'NO',
      Source: isCustomNotInLang(n.id,language)?'Custom':'Built-in'
    });

    // Helpers because isCustomArt only checks current lang
    function isCustomArtInLang(id,lng){return custArt[lng].some(x=>x.id===id);}
    function isCustomNotInLang(id,lng){return custNot[lng].some(x=>x.id===id);}

    // Build all article/notice rows (custom + built-in, both languages)
    const allArtEn=[...custArt.en,...BUILT_ART.en.filter(a=>!hiddenArt.en.has(a.id))];
    const allArtMr=[...custArt.mr,...BUILT_ART.mr.filter(a=>!hiddenArt.mr.has(a.id))];
    const allNotEn=[...custNot.en,...BUILT_NOT.en.filter(n=>!hiddenNot.en.has(n.id))];
    const allNotMr=[...custNot.mr,...BUILT_NOT.mr.filter(n=>!hiddenNot.mr.has(n.id))];

    const artEnRows=allArtEn.map(a=>artRow(a,'EN'));
    const artMrRows=allArtMr.map(a=>artRow(a,'MR'));
    const notEnRows=allNotEn.map(n=>notRow(n,'EN'));
    const notMrRows=allNotMr.map(n=>notRow(n,'MR'));

    // Hidden items (built-in items that have been deleted/replaced)
    const hiddenRows=[];
    hiddenArt.en.forEach(id=>hiddenRows.push({Type:'Article',Language:'EN',ID:id,Reason:'Deleted or edited (built-in)'}));
    hiddenArt.mr.forEach(id=>hiddenRows.push({Type:'Article',Language:'MR',ID:id,Reason:'Deleted or edited (built-in)'}));
    hiddenNot.en.forEach(id=>hiddenRows.push({Type:'Notice',Language:'EN',ID:id,Reason:'Deleted or edited (built-in)'}));
    hiddenNot.mr.forEach(id=>hiddenRows.push({Type:'Notice',Language:'MR',ID:id,Reason:'Deleted or edited (built-in)'}));

    // Pinned alert
    const pinnedRows=[{
      Show:pinnedAlert.show?'YES':'NO',
      ItemType:pinnedAlert.itemType||'',
      ItemID:pinnedAlert.itemId||'',
      EN_Label:pinnedAlert.en.lbl,
      EN_Title:pinnedAlert.en.title,
      EN_Desc:pinnedAlert.en.desc,
      MR_Label:pinnedAlert.mr.lbl,
      MR_Title:pinnedAlert.mr.title,
      MR_Desc:pinnedAlert.mr.desc
    }];

    // Metadata
    const metaRows=[
      {Field:'Schema Version',Value:'1'},
      {Field:'Backup Date',Value:today.toISOString()},
      {Field:'Backup Date (Local)',Value:today.toLocaleString()},
      {Field:'Court Name',Value:'Regional Justice Court'},
      {Field:'Total Articles (EN)',Value:allArtEn.length},
      {Field:'Total Articles (MR)',Value:allArtMr.length},
      {Field:'Total Notices (EN)',Value:allNotEn.length},
      {Field:'Total Notices (MR)',Value:allNotMr.length},
      {Field:'Hidden Items',Value:hiddenRows.length},
      {Field:'Pinned Alert Active',Value:pinnedAlert.show?'YES':'NO'},
      {Field:'Generated By',Value:'Justice Court Portal — Excel Backup'},
    ];

    // Add sheets
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(metaRows),'Metadata');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(artEnRows),'Articles_EN');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(artMrRows),'Articles_MR');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(notEnRows),'Notices_EN');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(notMrRows),'Notices_MR');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(hiddenRows),'Hidden_Items');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pinnedRows),'Pinned_Alert');

    // Write file
    const filename=`court-backup-${dateStr}.xlsx`;
    XLSX.writeFile(wb,filename);

    // Update last export date
    lastExportDate=new Date().toISOString();
    saveToLocal();
    showToast(L().toastExportOk,'✅');
    updateBackupStatus();
  } catch(e){
    console.error('Excel export failed:',e);
    alert('Export failed: '+e.message);
  }
}

// ── LAYER 2: EXCEL IMPORT ──
function handleExcelFile(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});

      // Validate this is our format
      const required=['Metadata','Articles_EN','Articles_MR','Notices_EN','Notices_MR'];
      const missing=required.filter(s=>!wb.SheetNames.includes(s));
      if(missing.length){
        showToast(L().toastImportFail,'⚠️',true);
        event.target.value='';
        return;
      }

      // Parse sheets
      const meta=XLSX.utils.sheet_to_json(wb.Sheets['Metadata']||{});
      const artEn=XLSX.utils.sheet_to_json(wb.Sheets['Articles_EN']||{});
      const artMr=XLSX.utils.sheet_to_json(wb.Sheets['Articles_MR']||{});
      const notEn=XLSX.utils.sheet_to_json(wb.Sheets['Notices_EN']||{});
      const notMr=XLSX.utils.sheet_to_json(wb.Sheets['Notices_MR']||{});
      const hidden=wb.Sheets['Hidden_Items']?XLSX.utils.sheet_to_json(wb.Sheets['Hidden_Items']):[];
      const pinned=wb.Sheets['Pinned_Alert']?XLSX.utils.sheet_to_json(wb.Sheets['Pinned_Alert']):[];

      // Stash for confirmation
      pendingImportData={meta,artEn,artMr,notEn,notMr,hidden,pinned,filename:file.name};

      // Show preview modal
      showImportPreview();
    } catch(err){
      console.error('Import parse failed:',err);
      showToast(L().toastImportFail,'⚠️',true);
    }
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function showImportPreview(){
  if(!pendingImportData) return;
  const l=L();
  const d=pendingImportData;
  const metaMap={};
  d.meta.forEach(r=>{metaMap[r.Field]=r.Value;});
  const backupDate=metaMap['Backup Date (Local)']||metaMap['Backup Date']||'—';
  const preview=$('imp-preview');
  preview.innerHTML=`
    <div class="import-preview-row"><span>${l.impFile}:</span><strong>${escapeHtml(d.filename)}</strong></div>
    <div class="import-preview-row"><span>${l.impDate}:</span><strong>${escapeHtml(backupDate)}</strong></div>
    <div class="import-preview-row"><span>${l.impArticles} (EN):</span><strong>${d.artEn.length}</strong></div>
    <div class="import-preview-row"><span>${l.impArticles} (MR):</span><strong>${d.artMr.length}</strong></div>
    <div class="import-preview-row"><span>${l.impNotices} (EN):</span><strong>${d.notEn.length}</strong></div>
    <div class="import-preview-row"><span>${l.impNotices} (MR):</span><strong>${d.notMr.length}</strong></div>
    <div class="import-preview-row"><span>${l.impHidden}:</span><strong>${d.hidden.length}</strong></div>
    <div class="import-preview-row"><span>${l.impPinned}:</span><strong>${d.pinned[0]&&d.pinned[0].Show==='YES'?'YES':'NO'}</strong></div>
  `;
  $('import-ov').classList.add('open');
}

function closeImportPreview(){
  $('import-ov').classList.remove('open');
  pendingImportData=null;
}

function confirmImport(){
  if(!pendingImportData) return;
  const d=pendingImportData;
  try{
    // Reconstruct custom articles per language
    const newCustArt={en:[],mr:[]};
    const newCustNot={en:[],mr:[]};

    [{rows:d.artEn,lang:'en'},{rows:d.artMr,lang:'mr'}].forEach(({rows,lang})=>{
      rows.forEach(r=>{
        if(r.Source==='Custom'){
          newCustArt[lang].push({
            id:r.ID,
            day:String(r.Day||''),mon:r.Month||'',yr:String(r.Year||''),
            tag:r.Category||'',tagKey:r.CategoryKey||r.Category||'General',
            author:r.Author||'',
            title:r.Title||'',summary:r.Summary||'',body:r.Body||'',
            isPinned:r.Pinned==='YES'
          });
        }
        // Built-in items: if pinned status changed, update the live BUILT_ART
        else if(r.Source==='Built-in'){
          const bi=BUILT_ART[lang].find(a=>a.id===r.ID);
          if(bi){bi.isPinned=r.Pinned==='YES';}
        }
      });
    });

    [{rows:d.notEn,lang:'en'},{rows:d.notMr,lang:'mr'}].forEach(({rows,lang})=>{
      rows.forEach(r=>{
        if(r.Source==='Custom'){
          newCustNot[lang].push({
            id:r.ID,
            cls:r.ColourClass||'',ico:r.Icon||'📋',
            tag:r.Category||'',tagKey:r.CategoryKey||r.Category||'General',
            author:r.Author||'',date:r.Date||'',
            title:r.Title||'',summary:r.Summary||'',body:r.Body||'',
            isPinned:r.Pinned==='YES'
          });
        } else if(r.Source==='Built-in'){
          const bi=BUILT_NOT[lang].find(n=>n.id===r.ID);
          if(bi){bi.isPinned=r.Pinned==='YES';}
        }
      });
    });

    custArt=newCustArt;
    custNot=newCustNot;

    // Rebuild hidden sets
    const newHiddenArt={en:new Set(),mr:new Set()};
    const newHiddenNot={en:new Set(),mr:new Set()};
    d.hidden.forEach(h=>{
      const lng=(h.Language||'EN').toLowerCase();
      if(h.Type==='Article')newHiddenArt[lng].add(h.ID);
      else if(h.Type==='Notice')newHiddenNot[lng].add(h.ID);
    });
    hiddenArt=newHiddenArt;
    hiddenNot=newHiddenNot;

    // Restore pinned alert
    if(d.pinned.length){
      const p=d.pinned[0];
      pinnedAlert={
        show:p.Show==='YES',
        itemType:p.ItemType||null,
        itemId:p.ItemID||null,
        en:{lbl:p.EN_Label||'',title:p.EN_Title||'',desc:p.EN_Desc||''},
        mr:{lbl:p.MR_Label||'',title:p.MR_Title||'',desc:p.MR_Desc||''}
      };
    }

    // Persist + re-render
    saveToLocal();
    renderPinnedAlert();
    renderArticles(allArt());
    renderNotices(allNot());
    if($('ap-art').style.display!=='none')renderManageArt();
    if($('ap-not').style.display!=='none')renderManageNot();
    updateBackupStatus();

    closeImportPreview();
    showToast(L().toastImportOk,'✅');
  } catch(e){
    console.error('Import failed:',e);
    showToast(L().toastImportFail,'⚠️',true);
  }
}

// ── BACKUP STATUS DISPLAY ──
function updateBackupStatus(){
  const l=L();
  const r1=$('bk-row1-val'),r2=$('bk-row2-val'),r3=$('bk-row3-val'),r4=$('bk-row4-val');
  if(!r1) return;

  // Auto-save status
  r1.textContent=localStorage.getItem(LS_KEY)?l.bkAutoActive:l.bkNever;
  r1.className='bs-value '+(localStorage.getItem(LS_KEY)?'ok':'warn');

  // Last export date
  if(lastExportDate){
    const d=new Date(lastExportDate);
    const days=Math.floor((Date.now()-d.getTime())/86400000);
    r2.textContent=d.toLocaleDateString()+(days===0?(lang==='en'?' (today)':' (आज)'):days===1?(lang==='en'?' (yesterday)':' (काल)'):(lang==='en'?` (${days} days ago)`:` (${l.nf(days)} दिवसांपूर्वी)`));
    r2.className='bs-value '+(days<=7?'ok':days<=14?'warn':'bad');
  } else {
    r2.textContent=l.bkNever;
    r2.className='bs-value bad';
  }

  // Current data count
  const artCount=allArt().length, notCount=allNot().length;
  r3.textContent=`${l.nf(artCount)} ${l.bkArticlesCount} · ${l.nf(notCount)} ${l.bkNoticesCount}`;
  r3.className='bs-value';

  // Storage size
  try{
    const size=localStorage.getItem(LS_KEY)?Math.ceil(localStorage.getItem(LS_KEY).length/1024):0;
    r4.textContent=`${l.nf(size)} ${l.bkSizeKB}`;
    r4.className='bs-value '+(size<2048?'ok':size<4096?'warn':'bad');
  } catch(e){r4.textContent='—';}
}

// ── TOAST NOTIFICATIONS ──
function showToast(msg,icon='✅',isError=false){
  const toast=$('toast');
  $('toast-ico').textContent=icon;
  $('toast-msg').textContent=msg;
  toast.style.borderColor=isError?'var(--red)':'var(--green)';
  toast.style.borderLeftColor=isError?'var(--red)':'var(--green)';
  toast.style.transform='translateX(-50%) translateY(0)';
  toast.style.opacity='1';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>{
    toast.style.transform='translateX(-50%) translateY(100px)';
    toast.style.opacity='0';
  },3200);
}

// ── HELPERS ──
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── AUTO-SAVE HOOKS — wrap mutating actions ──
const _origPublishItem=publishItem;
publishItem=function(){_origPublishItem();scheduleAutoSave();};
const _origConfirmDeleteAction=confirmDeleteAction;
confirmDeleteAction=function(){_origConfirmDeleteAction();scheduleAutoSave();};
const _origTogglePinItem=togglePinItem;
togglePinItem=function(t,i){_origTogglePinItem(t,i);scheduleAutoSave();};
const _origUnpinAlert=unpinAlert;
unpinAlert=function(){_origUnpinAlert();scheduleAutoSave();};
const _origEditPinned=editPinned;
editPinned=function(){_origEditPinned();scheduleAutoSave();};

/* ════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════ */
// Load any existing data from browser storage on startup
loadFromLocal();
$('f-date').value=new Date().toISOString().split('T')[0];
applyLang();
</script>
