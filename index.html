<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DownTown</title>

<link rel="icon"
href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">$</text></svg>'>

<style>

body{
    margin:0;
    padding:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Helvetica,
    Arial,
    sans-serif;

    color:white;
}

.container{

    display:flex;

    flex-direction:column;

    align-items:center;

    width:90%;

    max-width:400px;

    gap:20px;
}

input{

    width:100%;

    padding:15px 20px;

    font-size:16px;

    border-radius:10px;

    border:2px solid #333;

    background:#1a1a1a;

    color:white;

    outline:none;

    box-sizing:border-box;
}

input::placeholder{

    color:#777;
}

input:focus{

    border-color:#add8e6;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    background:#add8e6;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#87ceeb;
}

.notice{

    color:#666;

    font-size:12px;

    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<input
id="linkInput"
type="text"
placeholder="Tap here to paste Instagram Link">

<button id="downloadBtn">
Download
</button>

<div
class="notice"
id="statusText">

Tap input box to auto paste.

</div>

</div>

<script>

const linkInput=
document.getElementById(
"linkInput"
);

const downloadBtn=
document.getElementById(
"downloadBtn"
);

const statusText=
document.getElementById(
"statusText"
);

function resetUI(){

downloadBtn.style.display=
"block";

statusText.style.color=
"#666";

statusText.innerText=
"Tap input box to auto paste.";
}



async function forceDownload(
url
){

try{

statusText.innerText=
"Downloading...";

const response=
await fetch(url);

if(
!response.ok
){

throw new Error(
"Download failed"
);
}

const blob=
await response.blob();

let ext=".mp4";

if(
blob.type.includes(
"image"
)
){

ext=".jpg";
}

if(
blob.type.includes(
"video"
)
){

ext=".mp4";
}

const blobUrl=
window.URL.createObjectURL(
blob
);

const a=
document.createElement(
"a"
);

a.href=
blobUrl;

a.download=
`DownTown_${
Date.now()
}${ext}`;

document.body.appendChild(
a
);

a.click();

a.remove();

window.URL.revokeObjectURL(
blobUrl
);

statusText.innerText=
"Download complete";

downloadBtn.style.display=
"block";

}

catch(err){

console.log(
err
);

const a=
document.createElement(
"a"
);

a.href=url;

a.download="";

a.target="_blank";

document.body.appendChild(
a
);

a.click();

a.remove();

statusText.innerText=
"Opening download...";

downloadBtn.style.display=
"block";
}

}




async function processDownload(
url
){

downloadBtn.style.display=
"none";

statusText.style.color=
"#add8e6";

statusText.innerText=
"Extracting media...";


const apiKey=
"b42bc3dcb3mshb23fbdb6cbd5513p1c32eejsn48d5828b87e7";


const apiHost=
"instagram-downloader-download-instagram-stories-videos4.p.rapidapi.com";


const options={

method:"GET",

headers:{

"x-rapidapi-key":
apiKey,

"x-rapidapi-host":
apiHost,

"Content-Type":
"application/json"

}

};

try{

const apiUrl=

`https://${apiHost}/convert?url=${encodeURIComponent(url)}`;

const response=

await fetch(
apiUrl,
options
);

const data=
await response.json();



function findLink(
obj
){

if(
!obj
)
return null;


if(

typeof obj===
"string"

&&

obj.startsWith(
"http"
)

){

return obj;
}



if(
Array.isArray(
obj
)
){

for(
const item
of obj
){

const result=
findLink(
item
);

if(
result
)
return result;
}

}



if(

typeof obj===
"object"

){

const keys=[

"url",

"video_url",

"download_link",

"video",

"media"

];


for(
const key
of keys
){

if(

obj[key]

&&

typeof obj[key]
==="string"

){

return obj[key];
}

}


for(
const k
in obj
){

const result=

findLink(
obj[k]
);

if(
result
)
return result;
}

}

return null;

}



const mediaLink=

findLink(
data
);


if(
!mediaLink
){

alert(
"Media extraction failed"
);

console.log(
data
);

resetUI();

return;
}


await forceDownload(
mediaLink
);

}

catch(err){

console.error(
err
);

alert(
"Network/API error"
);

resetUI();

}

}



linkInput.addEventListener(

"click",

async()=>{

linkInput.value="";

try{

const text=

await navigator
.clipboard
.readText();


if(

text

&&

(

text.includes(
"instagram.com"
)

||

text.includes(
"instagr.am"
)

)

){

linkInput.value=
text;

processDownload(
text
);

}

}

catch(err){

console.log(
err
);

}

}

);



downloadBtn.addEventListener(

"click",

()=>{

const url=

linkInput.value
.trim();

if(
!url
){

alert(
"Paste Instagram link first"
);

return;
}

processDownload(
url
);

}

);

</script>

</body>
</html>
